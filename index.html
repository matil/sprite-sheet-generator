// BODY PART ENGINE: splits image into 6 regions, draws each with rotation around joints
function drawPart(ctx, img, region, pivotX, pivotY, rot, ox, oy, alpha) {
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.translate(pivotX, pivotY);
  ctx.rotate(rot || 0);
  ctx.translate(-pivotX, -pivotY);
  ctx.drawImage(img,
    region.sx, region.sy, region.sw, region.sh,
    region.dx + (ox||0), region.dy + (oy||0), region.dw, region.dh);
  ctx.restore();
}

function getParts(img, size) {
  var iw = img.width, ih = img.height;
  var ox = (size - iw) / 2, oy = (size - ih) / 2;
  var cx = ox + iw/2;
  function R(l,t,r,b) {
    return {
      sx: iw*l, sy: ih*t, sw: iw*(r-l), sh: ih*(b-t),
      dx: ox+iw*l, dy: oy+ih*t, dw: iw*(r-l), dh: ih*(b-t)
    };
  }
  return {
    head:     { r: R(0.15, 0, 0.85, 0.28),     px: cx,            py: oy + ih*0.28 },
    torso:    { r: R(0.1, 0.24, 0.9, 0.54),     px: cx,            py: oy + ih*0.39 },
    leftArm:  { r: R(0, 0.2, 0.3, 0.55),        px: ox + iw*0.22,  py: oy + ih*0.22 },
    rightArm: { r: R(0.7, 0.2, 1, 0.55),        px: ox + iw*0.78,  py: oy + ih*0.22 },
    leftLeg:  { r: R(0, 0.5, 0.5, 1),           px: ox + iw*0.35,  py: oy + ih*0.5 },
    rightLeg: { r: R(0.5, 0.5, 1, 1),           px: ox + iw*0.65,  py: oy + ih*0.5 }
  };
}

function drawChar(ctx, img, size, p) {
  var bp = getParts(img, size);
  var bx = (p.bx||0), by = (p.by||0), al = p.alpha !== undefined ? p.alpha : 1;

    var pr = p[name] || {};
    var tox = bx + (pr.ox||0);
    var toy = by + (pr.oy||0);
    // torso rotation affects head position
    if (name === "head") {
      var tr = p.torso || {};
      tox += (tr.ox||0)*0.4;
      toy += (tr.oy||0)*0.4;
    }
    drawPart(ctx, img, part.r, part.px + bx, part.py + by, pr.rot||0, tox, toy, al);
  });
}

function drawDust(ctx,x,y,n,s,a,sz){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#aaa';for(var i=0;i<n;i++){var an=(i/n)*Math.PI*2,d=s*(0.3+Math.random()*0.7);ctx.beginPath();ctx.arc(x+Math.cos(an)*d,y-Math.random()*s*0.3,sz*(0.5+Math.random()),0,Math.PI*2);ctx.fill();}ctx.restore();}
