<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprite Sheet Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;

// ============================================================
// MESH WARP ENGINE - divides image into triangle grid and
// displaces vertices per-frame for smooth organic deformation
// ============================================================
const MESH_RES = 12; // grid divisions

function createMeshGrid(w, h, cols, rows) {
  const verts = [];
  for (let r = 0; r <= rows; r++) {
    for (let c = 0; c <= cols; c++) {
      verts.push({ x: (c / cols) * w, y: (r / rows) * h, u: c / cols, v: r / rows });
    }
  }
  return verts;
}

function drawMesh(ctx, img, verts, cols, rows, dx, dy) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const i0 = r * (cols + 1) + c;
      const i1 = i0 + 1;
      const i2 = (r + 1) * (cols + 1) + c;
      const i3 = i2 + 1;
      const v0 = verts[i0], v1 = verts[i1], v2 = verts[i2], v3 = verts[i3];
      drawTriangle(ctx, img, dx, dy, v0, v1, v2);
      drawTriangle(ctx, img, dx, dy, v1, v3, v2);
    }
  }
}

function drawTriangle(ctx, img, dx, dy, p0, p1, p2) {
  const x0 = p0.x + dx, y0 = p0.y + dy;
  const x1 = p1.x + dx, y1 = p1.y + dy;
  const x2 = p2.x + dx, y2 = p2.y + dy;
  const u0 = p0.u * img.width, v0t = p0.v * img.height;
  const u1 = p1.u * img.width, v1t = p1.v * img.height;
  const u2 = p2.u * img.width, v2t = p2.v * img.height;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.closePath();
  ctx.clip();

  const denom = u0 * (v1t - v2t) - u1 * (v0t - v2t) + u2 * (v0t - v1t);
  if (Math.abs(denom) < 0.001) { ctx.restore(); return; }

  const m11 = -(v0t * (x2 - x1) - v1t * (x2 - x0) + v2t * (x1 - x0)) / denom;
  const m12 = (v0t * (y2 - y1) - v1t * (y2 - y0) + v2t * (y1 - y0)) / denom;
  const m21 = (u0 * (x2 - x1) - u1 * (x2 - x0) + u2 * (x1 - x0)) / denom;
  const m22 = -(u0 * (y2 - y1) - u1 * (y2 - y0) + u2 * (y1 - y0)) / denom;
  const mdx = (u0 * (v2t * x1 - v1t * x2) - u1 * (v2t * x0 - v0t * x2) + u2 * (v1t * x0 - v0t * x1)) / denom;
  const mdy = -(u0 * (v2t * y1 - v1t * y2) - u1 * (v2t * y0 - v0t * y2) + u2 * (v1t * y0 - v0t * y1)) / denom;

  ctx.setTransform(m11, m12, m21, m22, mdx, mdy);
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}

// Apply a displacement function to mesh vertices
function warpMesh(baseVerts, w, h, displaceFn) {
  return baseVerts.map(v => {
    const d = displaceFn(v.u, v.v, v.x, v.y, w, h);
    return { ...v, x: v.x + (d.dx || 0), y: v.y + (d.dy || 0) };
  });
}

// ============================================================
// FX helpers
// ============================================================
function drawDust(ctx, x, y, count, spread, alpha, sz) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = '#999';
  for (let i = 0; i < count; i++) {
    const a = (i / count) * Math.PI * 2 + x * 0.1;
    const d = spread * (0.3 + Math.random() * 0.7);
    ctx.beginPath();
    ctx.arc(x + Math.cos(a) * d, y + Math.sin(a * 0.5) * d * 0.4 - Math.random() * spread * 0.3, sz * (0.5 + Math.random()), 0, Math.PI * 2);
    ctx.fill();
  } ctx.restore();
}
function drawSpeedLines(ctx, x, y, h, count, alpha, len) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
  for (let i = 0; i < count; i++) {
    const ly = y + (i / count) * h + Math.random() * 8;
    const l = len * (0.4 + Math.random() * 0.6);
    ctx.beginPath(); ctx.moveTo(x - l, ly); ctx.lineTo(x, ly); ctx.stroke();
  } ctx.restore();
}
function drawImpact(ctx, x, y, r, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(a) * r * 0.3, y + Math.sin(a) * r * 0.3);
    ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    ctx.stroke();
  } ctx.restore();
}

// ============================================================
// ANIMATIONS - each returns a function that displaces mesh verts
// ============================================================
const ANIMATIONS = {
  idle: {
    label: "Idle", desc: "Breathing with body sway",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const iw = img.width, ih = img.height;
      const dx = (size - iw) / 2, dy = (size - ih) / 2;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        // Breathe: chest expands, hips stable
        const breathe = Math.sin(t) * iw * 0.02 * (1 - v) * Math.sin(v * Math.PI);
        // Gentle sway
        const sway = Math.sin(t * 0.5) * iw * 0.015 * (1 - v);
        // Vertical breathe
        const vBreath = Math.sin(t) * ih * 0.008 * (1 - v);
        return { dx: breathe * (u - 0.5) * 2 + sway, dy: -vBreath };
      });
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
    }
  },
  run: {
    label: "Run", desc: "Full run cycle with leg drive",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const iw = img.width, ih = img.height;
      const bounce = Math.abs(Math.sin(t)) * size * -0.04;
      const dx = (size - iw) / 2, dy = (size - ih) / 2 + bounce;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        // Legs: strong alternating swing from hips down
        const legZone = Math.max(0, (v - 0.55) / 0.45); // 0 above hips, 0->1 for legs
        const legSwing = Math.sin(t) * iw * 0.25 * legZone * legZone;
        // Counter-swing for front/back leg
        const legSplit = (u - 0.5) * Math.sin(t) * iw * 0.08 * legZone;
        // Torso lean
        const torsoZone = Math.min(v / 0.55, 1) * (1 - Math.max(0, (v - 0.55) / 0.45));
        const lean = Math.sin(t) * iw * 0.06 * torsoZone;
        // Arms swing opposite to legs
        const armZone = v > 0.2 && v < 0.55 ? Math.sin((v - 0.2) / 0.35 * Math.PI) : 0;
        const armSide = (u < 0.3 || u > 0.7) ? (u < 0.5 ? -1 : 1) : 0;
        const armSwing = Math.sin(t + Math.PI) * iw * 0.08 * armZone * armSide;
        // Head bob
        const headZone = v < 0.2 ? (1 - v / 0.2) : 0;
        const headBob = Math.sin(t * 2) * iw * 0.02 * headZone;
        // Vertical compression on contact
        const vSquash = Math.abs(Math.sin(t)) > 0.9 ? ih * 0.015 * v : 0;
        return { dx: legSwing + lean + armSwing + headBob + legSplit, dy: vSquash };
      });
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
      // FX
      if (Math.abs(Math.sin(t)) > 0.85) drawDust(ctx, size / 2 + Math.sin(t) * 10, dy + ih, 5, size * 0.07, 0.35, size * 0.01);
      drawSpeedLines(ctx, dx - 5, dy + ih * 0.3, ih * 0.5, 4, 0.12 + Math.abs(Math.sin(t)) * 0.15, size * 0.12);
    }
  },
  walk: {
    label: "Walk", desc: "Walking stride with weight shift",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const iw = img.width, ih = img.height;
      const bounce = Math.abs(Math.sin(t)) * size * -0.015;
      const dx = (size - iw) / 2, dy = (size - ih) / 2 + bounce;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        const legZone = Math.max(0, (v - 0.5) / 0.5);
        const legSwing = Math.sin(t) * iw * 0.14 * legZone * legZone;
        const hipSway = Math.sin(t) * iw * 0.025 * (1 - Math.abs(v - 0.5) * 2);
        const shoulderCounter = Math.sin(t + Math.PI) * iw * 0.03 * Math.max(0, 1 - v / 0.4);
        const armZone = v > 0.25 && v < 0.55 ? Math.sin((v - 0.25) / 0.3 * Math.PI) : 0;
        const armSide = (u < 0.25 || u > 0.75) ? (u < 0.5 ? -1 : 1) : 0;
        const armSwing = Math.sin(t + Math.PI) * iw * 0.05 * armZone * armSide;
        return { dx: legSwing + hipSway + shoulderCounter + armSwing, dy: 0 };
      });
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
    }
  },
  jump: {
    label: "Jump", desc: "Anticipation, launch, air, land",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const arc = -Math.sin(t * Math.PI) * size * 0.25;
      const dx = (size - iw) / 2, dy = (size - ih) / 2 + arc;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        let ddx = 0, ddy = 0;
        if (t < 0.15) {
          // Crouch: squash down, widen at bottom
          const p = t / 0.15;
          ddy = p * ih * 0.06 * v;
          ddx = p * iw * 0.04 * (u - 0.5) * v;
        } else if (t < 0.35) {
          // Launch: stretch tall, narrow
          const p = (t - 0.15) / 0.2;
          ddy = -p * ih * 0.08 * (1 - v);
          ddx = -p * iw * 0.03 * (u - 0.5);
          // Legs extend down
          const legZ = Math.max(0, (v - 0.6) / 0.4);
          ddy += p * ih * 0.05 * legZ;
        } else if (t < 0.65) {
          // Air: tuck legs, arms up
          const p = (t - 0.35) / 0.3;
          const legZ = Math.max(0, (v - 0.55) / 0.45);
          ddy -= legZ * ih * 0.12 * Math.sin(p * Math.PI);
          ddx += (u - 0.5) * iw * 0.03 * Math.sin(p * Math.PI);
          // Arms up
          const armZ = v < 0.35 ? (1 - v / 0.35) : 0;
          ddy -= armZ * ih * 0.04 * Math.sin(p * Math.PI);
        } else if (t < 0.85) {
          // Descend: extend legs
          const p = (t - 0.65) / 0.2;
          const legZ = Math.max(0, (v - 0.5) / 0.5);
          ddy += legZ * ih * 0.06 * p;
        } else {
          // Land: heavy squash
          const p = (t - 0.85) / 0.15;
          ddy = p * ih * 0.08 * v;
          ddx = p * iw * 0.06 * (u - 0.5) * v;
        }
        return { dx: ddx, dy: ddy };
      });
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
      if (t > 0.85) { const p = (t - 0.85) / 0.15; drawDust(ctx, size / 2, dy + ih + arc, 6 + Math.floor(p * 6), size * 0.12 * p, 0.4 * p, size * 0.015); }
    }
  },
  attack: {
    label: "Attack", desc: "Wind-up strike with follow-through",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const dx = (size - iw) / 2, dy = (size - ih) / 2;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        let ddx = 0, ddy = 0;
        if (t < 0.25) {
          // Wind-up: pull back upper body, coil
          const p = t / 0.25;
          const upperZ = Math.max(0, 1 - v / 0.5);
          ddx = -p * iw * 0.12 * upperZ;
          ddy = p * ih * 0.03 * v; // slight crouch
          // Twist torso
          ddx += p * iw * 0.04 * (u - 0.5) * upperZ;
        } else if (t < 0.45) {
          // Strike: explosive forward thrust
          const p = (t - 0.25) / 0.2;
          const upperZ = Math.max(0, 1 - v / 0.55);
          ddx = iw * (-0.12 + 0.35 * p) * upperZ;
          // Leading edge stretches more
          const leadStretch = u > 0.5 ? (u - 0.5) * 2 : 0;
          ddx += p * iw * 0.1 * leadStretch * upperZ;
          ddy = (1 - p) * ih * 0.03 * v;
          // Legs plant
          const legZ = Math.max(0, (v - 0.6) / 0.4);
          ddx -= p * iw * 0.05 * legZ;
        } else if (t < 0.6) {
          // Impact hold
          const p = (t - 0.45) / 0.15;
          const upperZ = Math.max(0, 1 - v / 0.55);
          ddx = iw * 0.23 * upperZ * (1 - p * 0.1);
          const shake = Math.sin(p * Math.PI * 4) * iw * 0.02;
          ddx += shake;
          ddy += shake * 0.5;
        } else {
          // Recovery
          const p = (t - 0.6) / 0.4;
          const upperZ = Math.max(0, 1 - v / 0.55);
          ddx = iw * 0.2 * (1 - p * p) * upperZ;
        }
        return { dx: ddx, dy: ddy };
      });
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
      if (t > 0.4 && t < 0.6) { const p = (t - 0.4) / 0.2; drawImpact(ctx, dx + iw + iw * 0.08, dy + ih * 0.3, size * 0.1 * (1 - p), 0.7 * (1 - p)); }
    }
  },
  death: {
    label: "Death", desc: "Collapse and dissolve",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const dx = (size - iw) / 2, dy = (size - ih) / 2;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        // Tip over sideways with progressive collapse from top
        const fallProgress = t * t;
        const topDown = (1 - v); // head falls more
        const rotation = fallProgress * 1.4;
        // Simulate rotation by moving top right and bottom stays
        const ddx = topDown * Math.sin(rotation) * iw * 0.6 * fallProgress;
        const ddy = topDown * (1 - Math.cos(rotation)) * ih * 0.3 * fallProgress + fallProgress * ih * 0.1 * v;
        // Crumple effect
        const crumple = Math.sin(u * Math.PI * 3 + t * 5) * iw * 0.02 * fallProgress;
        return { dx: ddx + crumple, dy: ddy };
      });
      ctx.save();
      ctx.globalAlpha = 1 - t * 0.7;
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
      ctx.restore();
      if (t > 0.3) drawDust(ctx, size / 2 + t * iw * 0.3, dy + ih, 4 + Math.floor(t * 8), size * 0.1 * t, 0.3, size * 0.012);
    }
  },
  hit: {
    label: "Hit/Hurt", desc: "Impact recoil with flash",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const shake = Math.sin(t * Math.PI * 6) * size * 0.035 * (1 - t);
      const knock = Math.sin(t * Math.PI) * size * -0.05;
      const dx = (size - iw) / 2 + shake + knock, dy = (size - ih) / 2;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        // Bend backwards from impact
        const recoil = Math.sin(t * Math.PI);
        const bend = recoil * iw * 0.08 * (1 - v); // head goes back more
        const squish = recoil * iw * 0.03 * Math.sin(v * Math.PI); // mid-body compression
        // Wobble
        const wobble = Math.sin(t * Math.PI * 4 + v * Math.PI * 2) * iw * 0.015 * (1 - t);
        return { dx: -bend + wobble + squish * (u - 0.5) * 2, dy: recoil * ih * 0.02 * v };
      });
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
      if (t < 0.25) {
        ctx.save(); ctx.globalAlpha = (1 - t / 0.25) * 0.5;
        ctx.fillStyle = '#fff'; ctx.fillRect(dx, dy, iw, ih);
        ctx.restore();
        drawImpact(ctx, dx + iw * 0.3, dy + ih * 0.25, size * 0.08, 0.8 * (1 - t / 0.25));
      }
    }
  },
  spin: {
    label: "Spin", desc: "Full 360 rotation",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const iw = img.width, ih = img.height;
      const dx = (size - iw) / 2, dy = (size - ih) / 2;
      const base = createMeshGrid(iw, ih, MESH_RES, MESH_RES);
      const warped = warpMesh(base, iw, ih, (u, v) => {
        // Each row rotates with slight delay for helix effect
        const rowPhase = t + v * 0.4;
        const scaleX = Math.cos(rowPhase);
        const newX = 0.5 + (u - 0.5) * scaleX;
        return { dx: (newX - u) * iw, dy: Math.sin(rowPhase) * ih * 0.01 };
      });
      drawMesh(ctx, img, warped, MESH_RES, MESH_RES, dx, dy);
      const spd = Math.abs(Math.sin(t));
      if (spd > 0.6) drawSpeedLines(ctx, dx - 8, dy + ih * 0.2, ih * 0.6, 4, (spd - 0.6) * 0.6, size * 0.1);
    }
  },
};

const SIZES = [32, 64, 128, 256, 512];
const FRAME_OPTIONS = [2, 3, 4, 6, 8, 10, 12, 16];
function getPingPongMapping(fi, tf) { const uc = Math.ceil((tf + 1) / 2); return { frame: fi < uc ? fi : tf - fi, total: uc }; }

function App() {
  const [image, setImage] = useState(null);
  const [imgEl, setImgEl] = useState(null);
  const [selectedAnims, setSelectedAnims] = useState(["idle", "run", "walk", "jump"]);
  const [frameCount, setFrameCount] = useState(8);
  const [charSize, setCharSize] = useState(128);
  const [addShadow, setAddShadow] = useState(true);
  const [padding, setPadding] = useState(0);
  const [bgTransparent, setBgTransparent] = useState(true);
  const [spriteSheet, setSpriteSheet] = useState(null);
  const [previewAnim, setPreviewAnim] = useState(null);
  const [previewFrame, setPreviewFrame] = useState(0);
  const [playing, setPlaying] = useState(true);
  const fileInputRef = useRef(null);

  const handleUpload = useCallback((e) => {
    const file = (e.target.files || [])[0]; if (!file) return;
    const url = URL.createObjectURL(file); setImage(url);
    const img = new Image(); img.onload = () => setImgEl(img); img.src = url;
  }, []);
  const handleDrop = useCallback((e) => {
    e.preventDefault(); const file = (e.dataTransfer.files || [])[0];
    if (!file || !file.type.startsWith("image/")) return;
    const url = URL.createObjectURL(file); setImage(url);
    const img = new Image(); img.onload = () => setImgEl(img); img.src = url;
  }, []);
  const toggleAnim = (key) => setSelectedAnims(prev => prev.includes(key) ? prev.filter(a => a !== key) : [...prev, key]);

  const fitImage = useCallback((img, targetSize) => {
    const scale = (targetSize * 0.75) / Math.max(img.width, img.height);
    const c = document.createElement("canvas");
    c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
    const cx = c.getContext("2d"); cx.imageSmoothingEnabled = charSize > 64;
    cx.drawImage(img, 0, 0, c.width, c.height);
    const fitted = new Image(); fitted.src = c.toDataURL(); fitted.width = c.width; fitted.height = c.height;
    return fitted;
  }, [charSize]);

  const drawShadow2 = (ctx, size) => { ctx.save(); ctx.beginPath(); ctx.ellipse(size / 2, size * 0.85, size * 0.28, size * 0.045, 0, 0, Math.PI * 2); ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fill(); ctx.restore(); };

  // AUTO-GENERATE on any change
  useEffect(() => {
    if (!imgEl || selectedAnims.length === 0) { setSpriteSheet(null); return; }
    const fitted = fitImage(imgEl, charSize);
    const doGenerate = () => {
      const cellSize = charSize + padding * 2;
      const canvas = document.createElement("canvas");
      canvas.width = frameCount * cellSize; canvas.height = selectedAnims.length * cellSize;
      const ctx = canvas.getContext("2d"); ctx.imageSmoothingEnabled = charSize > 64;
      if (!bgTransparent) { ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
      selectedAnims.forEach((animKey, row) => {
        const anim = ANIMATIONS[animKey];
        for (let f = 0; f < frameCount; f++) {
          const oc = document.createElement("canvas"); oc.width = cellSize; oc.height = cellSize;
          const octx = oc.getContext("2d"); octx.imageSmoothingEnabled = charSize > 64;
          octx.save(); octx.translate(padding, padding);
          if (addShadow) drawShadow2(octx, charSize);
          const { frame: mf, total: ut } = getPingPongMapping(f, frameCount);
          anim.generate(octx, fitted, mf, ut, charSize);
          octx.restore();
          ctx.drawImage(oc, f * cellSize, row * cellSize);
        }
      });
      setSpriteSheet(canvas.toDataURL("image/png"));
      setPreviewAnim(prev => selectedAnims.includes(prev) ? prev : selectedAnims[0]);
      setPreviewFrame(0);
    };
    if (fitted.complete) doGenerate(); else fitted.onload = doGenerate;
  }, [imgEl, selectedAnims, frameCount, charSize, addShadow, padding, bgTransparent, fitImage]);

  // Preview animation loop
  useEffect(() => {
    if (!spriteSheet || !previewAnim || !playing) return;
    let f = 0;
