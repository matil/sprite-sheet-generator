<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprite Sheet Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;

// BODY PART ENGINE: splits image into 6 regions, draws each with rotation around joints
function drawPart(ctx, img, region, pivotX, pivotY, rot, ox, oy, alpha) {
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.translate(pivotX, pivotY);
  ctx.rotate(rot || 0);
  ctx.translate(-pivotX, -pivotY);
  ctx.drawImage(img,
    region.sx, region.sy, region.sw, region.sh,
    region.dx + (ox||0), region.dy + (oy||0), region.dw, region.dh);
  ctx.restore();
}

function getParts(img, size) {
  var iw = img.width, ih = img.height;
  var ox = (size - iw) / 2, oy = (size - ih) / 2;
  var cx = ox + iw/2;
  function R(l,t,r,b) {
    return {
      sx: iw*l, sy: ih*t, sw: iw*(r-l), sh: ih*(b-t),
      dx: ox+iw*l, dy: oy+ih*t, dw: iw*(r-l), dh: ih*(b-t)
    };
  }
  return {
    head:     { r: R(0.15, 0, 0.85, 0.28),     px: cx,            py: oy + ih*0.28 },
    torso:    { r: R(0.1, 0.24, 0.9, 0.54),     px: cx,            py: oy + ih*0.39 },
    leftArm:  { r: R(0, 0.2, 0.3, 0.55),        px: ox + iw*0.22,  py: oy + ih*0.22 },
    rightArm: { r: R(0.7, 0.2, 1, 0.55),        px: ox + iw*0.78,  py: oy + ih*0.22 },
    leftLeg:  { r: R(0, 0.5, 0.5, 1),           px: ox + iw*0.35,  py: oy + ih*0.5 },
    rightLeg: { r: R(0.5, 0.5, 1, 1),           px: ox + iw*0.65,  py: oy + ih*0.5 }
  };
}

function drawChar(ctx, img, size, p) {
  var bp = getParts(img, size);
  var bx = (p.bx||0), by = (p.by||0), al = p.alpha !== undefined ? p.alpha : 1;
  // draw order: back leg, back arm, torso, head, front arm, front leg
  var order = ["rightLeg","rightArm","torso","head","leftArm","leftLeg"];
  order.forEach(function(name) {
    var part = bp[name];
    var pr = p[name] || {};
    var tox = bx + (pr.ox||0);
    var toy = by + (pr.oy||0);
    // torso rotation affects head position
    if (name === "head") {
      var tr = p.torso || {};
      tox += (tr.ox||0)*0.4;
      toy += (tr.oy||0)*0.4;
    }
    drawPart(ctx, img, part.r, part.px + bx, part.py + by, pr.rot||0, tox, toy, al);
  });
}

function drawDust(ctx,x,y,n,s,a,sz){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#aaa';for(var i=0;i<n;i++){var an=(i/n)*Math.PI*2,d=s*(0.3+Math.random()*0.7);ctx.beginPath();ctx.arc(x+Math.cos(an)*d,y-Math.random()*s*0.3,sz*(0.5+Math.random()),0,Math.PI*2);ctx.fill();}ctx.restore();}
function drawShadow(ctx,size){ctx.save();ctx.beginPath();ctx.ellipse(size/2,size*0.88,size*0.28,size*0.04,0,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.22)";ctx.fill();ctx.restore();}
function drawSpark(ctx,x,y,r,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#fff';ctx.lineWidth=2;for(var i=0;i<6;i++){var an=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(x+Math.cos(an)*r*0.25,y+Math.sin(an)*r*0.25);ctx.lineTo(x+Math.cos(an)*r,y+Math.sin(an)*r);ctx.stroke();}ctx.restore();}

var ANIMATIONS = {
  idle: { label:"Idle", desc:"Breathing & weight shift", generate: function(ctx,img,f,tot,sz) {
    var t=(f/tot)*Math.PI*2;
    // Slow breathing cycle with subtle weight shift
    var breathe=Math.sin(t);
    var shift=Math.sin(t*0.5);
    drawChar(ctx,img,sz,{
      head:{rot:shift*0.02, oy:breathe*-1.5},
      torso:{rot:shift*0.015, oy:breathe*-1},
      leftArm:{rot:0.05+breathe*0.04+shift*0.03},
      rightArm:{rot:-0.05-breathe*0.04-shift*0.03},
      leftLeg:{rot:shift*0.03},
      rightLeg:{rot:-shift*0.03},
      by:breathe*-1
    });
  }},
  run: { label:"Run", desc:"Full sprint cycle", generate: function(ctx,img,f,tot,sz) {
    var t=(f/tot)*Math.PI*2;
    // Run has 4 key poses: contact, down, passing, up
    // Bounce: high during flight, low at contact
    var contactPhase=Math.cos(t*2); // double-bounce per stride
    var bounce=(-Math.abs(Math.sin(t))*0.04 + (contactPhase>0.5?-0.015:0))*sz;
    // Forward lean is constant in a run
    var forwardLean=0.08;
    // Leg swing: front/back with asymmetric timing (faster forward snap)
    var legPhase=Math.sin(t);
    var legForward=legPhase>0?Math.pow(legPhase,0.7):-(Math.pow(-legPhase,0.7));
    // Arms oppose legs, elbows bent so less amplitude than legs
    drawChar(ctx,img,sz,{
      head:{rot:forwardLean*0.3+Math.sin(t*2)*0.02, oy:bounce*0.4},
      torso:{rot:forwardLean+Math.sin(t)*0.06, oy:bounce*0.3},
      leftArm:{rot:-legForward*0.85+forwardLean*0.5},
      rightArm:{rot:legForward*0.85+forwardLean*0.5},
      leftLeg:{rot:legForward*0.8},
      rightLeg:{rot:-legForward*0.8},
      by:bounce
    });
    // Dust on foot strike
    var strike=Math.abs(Math.sin(t));
    if(strike>0.92) drawDust(ctx,sz/2+Math.sin(t)*6,(sz+img.height)/2+bounce,5,sz*0.06,0.35,sz*0.01);
  }},
  walk: { label:"Walk", desc:"Natural walking gait", generate: function(ctx,img,f,tot,sz) {
    var t=(f/tot)*Math.PI*2;
    // Walk: one foot always on ground. Bounce peaks at midstance (leg straight under body)
    var bounce=Math.sin(t*2+Math.PI/2)*sz*0.012;
    // Hip sway: lateral weight shift over planted foot
    var hipSway=Math.sin(t)*sz*0.008;
    // Legs: moderate swing, front foot reaches, back foot pushes
    var legSwing=Math.sin(t);
    // Counter-rotation: shoulders twist opposite to hips
    var twist=Math.sin(t)*0.04;
    drawChar(ctx,img,sz,{
      head:{rot:-twist*0.3, ox:-hipSway*0.3},
      torso:{rot:twist, ox:hipSway},
      leftArm:{rot:-legSwing*0.35-0.05},
      rightArm:{rot:legSwing*0.35+0.05},
      leftLeg:{rot:legSwing*0.45},
      rightLeg:{rot:-legSwing*0.45},
      by:bounce
    });
  }},
  jump: { label:"Jump", desc:"Squat, launch, peak, land", generate: function(ctx,img,f,tot,sz) {
    var t=f/Math.max(tot-1,1);
    // Smooth parabolic arc
    var arc=-Math.sin(t*Math.PI)*sz*0.24;
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{},by:arc};
    if(t<0.18) {
      // Anticipation: deep squat, arms swing back, lean forward
      var q=t/0.18;
      var ease=q*q; // accelerating into squat
      p.torso={rot:ease*0.08, oy:ease*sz*0.03};
      p.leftLeg={rot:ease*0.35};
      p.rightLeg={rot:-ease*0.35};
      p.leftArm={rot:ease*0.5}; // arms back
      p.rightArm={rot:-ease*0.5};
      p.head={rot:-ease*0.04};
    } else if(t<0.35) {
      // Launch: explosive extension, arms drive up
      var q=(t-0.18)/0.17;
      var ease=1-Math.pow(1-q,2); // decelerating extension
      p.torso={rot:0.08*(1-ease)-ease*0.05, oy:0.03*sz*(1-ease)};
      p.leftLeg={rot:0.35*(1-ease)-ease*0.2};
      p.rightLeg={rot:-0.35*(1-ease)+ease*0.2};
      p.leftArm={rot:0.5-ease*1.3}; // arms drive up
      p.rightArm={rot:-0.5+ease*1.3};
      p.head={rot:-0.04+ease*0.06};
    } else if(t<0.65) {
      // Air: arms up, legs tuck
      var q=((t-0.35)/0.3);
      var tuck=Math.sin(q*Math.PI);
      p.leftArm={rot:-0.8-tuck*0.2};
      p.rightArm={rot:0.8+tuck*0.2};
      p.leftLeg={rot:tuck*0.5};
      p.rightLeg={rot:tuck*0.5};
      p.torso={rot:-0.05};
      p.head={rot:0.02};
    } else if(t<0.82) {
      // Descend: extend legs, arms come down
      var q=(t-0.65)/0.17;
      p.leftLeg={rot:-q*0.2};
      p.rightLeg={rot:q*0.2};
      p.leftArm={rot:-0.8+q*0.5};
      p.rightArm={rot:0.8-q*0.5};
      p.head={rot:q*0.04};
    } else {
      // Land: absorb with deep squat
      var q=(t-0.82)/0.18;
      var impact=Math.sin(q*Math.PI*0.5);
      p.torso={rot:impact*0.1, oy:impact*sz*0.03};
      p.leftLeg={rot:impact*0.4};
      p.rightLeg={rot:-impact*0.4};
      p.leftArm={rot:impact*0.3};
      p.rightArm={rot:-impact*0.3};
      p.head={rot:-impact*0.05};
    }
    drawChar(ctx,img,sz,p);
    if(t>0.85){var q=(t-0.85)/0.15; drawDust(ctx,sz/2,(sz+img.height)/2+arc,4+Math.floor(q*6),sz*0.1*q,0.35*q,sz*0.012);}
  }},
  attack: { label:"Attack", desc:"Slash with full body", generate: function(ctx,img,f,tot,sz) {
    var t=f/Math.max(tot-1,1);
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{}};
    if(t<0.3) {
      // Wind-up: coil back, shift weight to back foot
      var q=t/0.3;
      var ease=1-Math.pow(1-q,2);
      p.torso={rot:-ease*0.18, ox:-ease*sz*0.02};
      p.rightArm={rot:-ease*1.5}; // arm cocked way back
      p.leftArm={rot:ease*0.4}; // guard arm forward
      p.rightLeg={rot:-ease*0.2}; // weight back
      p.leftLeg={rot:ease*0.15};
      p.head={rot:-ease*0.08};
    } else if(t<0.45) {
      // Strike: explosive forward rotation
      var q=(t-0.3)/0.15;
      var ease=q*q*q; // sharp acceleration
      p.torso={rot:-0.18+ease*0.42, ox:-0.02*sz+ease*sz*0.06};
      p.rightArm={rot:-1.5+ease*3.0}; // huge swing
      p.leftArm={rot:0.4-ease*0.6};
      p.rightLeg={rot:-0.2+ease*0.35};
      p.leftLeg={rot:0.15-ease*0.1};
      p.head={rot:-0.08+ease*0.18};
    } else if(t<0.55) {
      // Follow-through: overextend
      var q=(t-0.45)/0.1;
      p.torso={rot:0.24+q*0.04, ox:sz*0.04};
      p.rightArm={rot:1.5+q*0.2}; // past peak
      p.leftArm={rot:-0.2-q*0.1};
      p.rightLeg={rot:0.15};
      p.leftLeg={rot:0.05};
      p.head={rot:0.1+q*0.02};
      // Impact shake
      var sh=Math.sin(q*Math.PI*6)*0.02;
      p.torso.rot+=sh; p.head.rot+=sh;
    } else {
      // Recovery: settle back
      var q=(t-0.55)/0.45;
      var ease=1-Math.pow(1-q,3);
      p.torso={rot:0.28*(1-ease)};
      p.rightArm={rot:1.7*(1-ease)};
      p.leftArm={rot:-0.3*(1-ease)};
      p.rightLeg={rot:0.15*(1-ease)};
      p.leftLeg={rot:0.05*(1-ease)};
      p.head={rot:0.12*(1-ease)};
    }
    drawChar(ctx,img,sz,p);
    if(t>0.42&&t<0.6){var q=1-Math.abs(t-0.48)/0.12; if(q>0) drawSpark(ctx,(sz+img.width)/2+sz*0.06,(sz-img.height)/2+img.height*0.28,sz*0.12*q,0.9*q);}
  }},
  death: { label:"Death", desc:"Collapse to ground", generate: function(ctx,img,f,tot,sz) {
    var t=f/Math.max(tot-1,1);
    // Phase 1: initial hit reaction (0-0.15)
    // Phase 2: knees buckle (0.15-0.4)
    // Phase 3: upper body follows, fall sideways (0.4-0.8)
    // Phase 4: settle on ground (0.8-1)
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{},by:0,alpha:1};
    if(t<0.15) {
      var q=t/0.15;
      p.head={rot:-q*0.1};
      p.torso={rot:-q*0.06};
      p.leftArm={rot:q*0.3};
      p.rightArm={rot:-q*0.4};
    } else if(t<0.4) {
      var q=(t-0.15)/0.25;
      var ease=q*q;
      p.leftLeg={rot:ease*0.6};
      p.rightLeg={rot:-ease*0.5};
      p.torso={rot:-0.06+ease*0.15};
      p.head={rot:-0.1+ease*0.05};
      p.leftArm={rot:0.3+ease*0.4};
      p.rightArm={rot:-0.4-ease*0.2};
      p.by=ease*sz*0.04;
    } else if(t<0.8) {
      var q=(t-0.4)/0.4;
      var ease=1-Math.pow(1-q,2);
      p.torso={rot:0.09+ease*0.7, ox:ease*sz*0.1};
      p.head={rot:-0.05+ease*0.9, ox:ease*sz*0.12};
      p.leftLeg={rot:0.6+ease*0.3};
      p.rightLeg={rot:-0.5+ease*0.2};
      p.leftArm={rot:0.7+ease*0.8+Math.sin(q*6)*0.08};
      p.rightArm={rot:-0.6-ease*0.3};
      p.by=sz*0.04+ease*sz*0.08;
      p.alpha=1-ease*0.3;
    } else {
      var q=(t-0.8)/0.2;
      p.torso={rot:0.79+q*0.05, ox:sz*0.1};
      p.head={rot:0.85+q*0.03, ox:sz*0.12};
      p.leftLeg={rot:0.9};
      p.rightLeg={rot:-0.3};
      p.leftArm={rot:1.5};
      p.rightArm={rot:-0.9};
      p.by=sz*0.12;
      p.alpha=0.7-q*0.35;
    }
    drawChar(ctx,img,sz,p);
    if(t>0.35) drawDust(ctx,sz/2+(t-0.35)*sz*0.15,(sz+img.height)/2+p.by,3+Math.floor(t*5),sz*0.07*t,0.2,sz*0.01);
  }},
  hit: { label:"Hit/Hurt", desc:"Impact & stagger", generate: function(ctx,img,f,tot,sz) {
    var t=f/Math.max(tot-1,1);
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{},bx:0};
    if(t<0.12) {
      // Initial impact: sharp backward snap
      var q=t/0.12;
      var snap=q*q;
      p.head={rot:-snap*0.25, ox:-snap*sz*0.04};
      p.torso={rot:-snap*0.15, ox:-snap*sz*0.03};
      p.leftArm={rot:snap*0.7};
      p.rightArm={rot:-snap*0.8};
      p.leftLeg={rot:-snap*0.12};
      p.rightLeg={rot:snap*0.1};
      p.bx=-snap*sz*0.05;
    } else if(t<0.35) {
      // Hold recoil + shake
      var q=(t-0.12)/0.23;
      var shake=Math.sin(q*Math.PI*5)*sz*0.02*(1-q);
      p.head={rot:-0.25+q*0.1, ox:-sz*0.04+q*sz*0.015+shake};
      p.torso={rot:-0.15+q*0.06, ox:-sz*0.03+q*sz*0.01+shake*0.7};
      p.leftArm={rot:0.7-q*0.2};
      p.rightArm={rot:-0.8+q*0.25};
      p.leftLeg={rot:-0.12+q*0.05};
      p.rightLeg={rot:0.1-q*0.04};
      p.bx=-sz*0.05+q*sz*0.02+shake;
    } else {
      // Recovery: return to neutral with slight overshoot
      var q=(t-0.35)/0.65;
      var ease=1-Math.pow(1-q,2);
      var overshoot=Math.sin(q*Math.PI)*0.04;
      p.head={rot:(-0.15+overshoot)*(1-ease)};
      p.torso={rot:(-0.09+overshoot)*(1-ease)};
      p.leftArm={rot:0.5*(1-ease)};
      p.rightArm={rot:-0.55*(1-ease)};
      p.leftLeg={rot:-0.07*(1-ease)};
      p.rightLeg={rot:0.06*(1-ease)};
      p.bx=-sz*0.03*(1-ease);
    }
    drawChar(ctx,img,sz,p);
    // Flash on character only
    if(t<0.15){var a=(1-t/0.15); ctx.save();ctx.globalAlpha=a*0.55;ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#fff';ctx.fillRect(0,0,sz,sz);ctx.restore(); drawSpark(ctx,(sz-img.width)/2+img.width*0.3,(sz-img.height)/2+img.height*0.2,sz*0.1,0.85*a);}
  }},
  spin: { label:"Spin", desc:"Full 360 rotation", generate: function(ctx,img,f,tot,sz) {
    var t=(f/tot)*Math.PI*2;
    var scaleX=Math.cos(t);
    var iw=img.width, ih=img.height;
    var dy=(sz-ih)/2;
    // Slight vertical bob during spin
    var bob=Math.sin(t*2)*sz*0.01;
    ctx.save();
    ctx.translate(sz/2,sz/2+bob);
    ctx.scale(scaleX>0?1:-1,1);
    ctx.scale(Math.abs(scaleX)*0.9+0.1,1);
    ctx.translate(-sz/2,-sz/2);
    ctx.drawImage(img, 0, 0, iw, ih, (sz-iw)/2, dy, iw, ih);
    ctx.restore();
  }}
};

var SIZES=[32,64,128,256,512];
var FRAME_OPTIONS=[2,3,4,6,8,10,12,16];
function getPingPong(fi,tf){var uc=Math.ceil((tf+1)/2);return{frame:fi<uc?fi:tf-fi,total:uc};}


// FLOOD-FILL BACKGROUND REMOVAL from edges
function removeBackground(img, tolerance) {
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var id = ctx.getImageData(0, 0, c.width, c.height);
  var d = id.data;
  var w = c.width, h = c.height;
  var tol = tolerance || 30;
  var visited = new Uint8Array(w * h);

  // Get background color samples from corners
  function getPixel(x, y) { var i = (y * w + x) * 4; return [d[i], d[i+1], d[i+2], d[i+3]]; }
  function colorDist(a, b) { return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) + Math.abs(a[2]-b[2]); }

  // Sample multiple corner pixels to get reliable bg color
  var samples = [];
  var margin = Math.max(1, Math.floor(Math.min(w, h) * 0.02));
  for (var sy = 0; sy < margin; sy++) {
    for (var sx = 0; sx < margin; sx++) {
      samples.push(getPixel(sx, sy));
      samples.push(getPixel(w - 1 - sx, sy));
      samples.push(getPixel(sx, h - 1 - sy));
      samples.push(getPixel(w - 1 - sx, h - 1 - sy));
    }
  }
  // Average bg color
  var bg = [0,0,0];
  samples.forEach(function(s) { bg[0] += s[0]; bg[1] += s[1]; bg[2] += s[2]; });
  bg[0] = Math.round(bg[0] / samples.length);
  bg[1] = Math.round(bg[1] / samples.length);
  bg[2] = Math.round(bg[2] / samples.length);

  // Flood fill from all edges
  var queue = [];
  for (var x = 0; x < w; x++) { queue.push(x); queue.push(0); queue.push(x); queue.push(h-1); }
  for (var y = 0; y < h; y++) { queue.push(0); queue.push(y); queue.push(w-1); queue.push(y); }

  var qi = 0;
  while (qi < queue.length) {
    var px = queue[qi++], py = queue[qi++];
    if (px < 0 || px >= w || py < 0 || py >= h) continue;
    var idx = py * w + px;
    if (visited[idx]) continue;
    var pix = getPixel(px, py);
    if (colorDist(pix, bg) > tol && pix[3] > 10) continue;
    visited[idx] = 1;
    var pi = idx * 4;
    d[pi + 3] = 0; // set alpha to 0
    queue.push(px-1); queue.push(py);
    queue.push(px+1); queue.push(py);
    queue.push(px); queue.push(py-1);
    queue.push(px); queue.push(py+1);
  }

  // Soften edges: semi-transparent border pixels
  for (var y2 = 1; y2 < h-1; y2++) {
    for (var x2 = 1; x2 < w-1; x2++) {
      var ci = y2 * w + x2;
      if (visited[ci]) continue;
      var neighbors = 0;
      if (visited[ci-1]) neighbors++;
      if (visited[ci+1]) neighbors++;
      if (visited[ci-w]) neighbors++;
      if (visited[ci+w]) neighbors++;
      if (neighbors > 0 && neighbors < 4) {
        d[ci * 4 + 3] = Math.round(d[ci * 4 + 3] * (1 - neighbors * 0.2));
      }
    }
  }

  ctx.putImageData(id, 0, 0);
  var result = new Image();
  result.src = c.toDataURL();
  result.width = c.width;
  result.height = c.height;
  return result;
}

function App(){
  var _img=useState(null),image=_img[0],setImage=_img[1];
  var _raw=useState(null),rawImg=_raw[0],setRawImg=_raw[1];
  var _imE=useState(null),imgEl=_imE[0],setImgEl=_imE[1];
  var _rbg=useState(false),removeBg=_rbg[0],setRemoveBg=_rbg[1];
