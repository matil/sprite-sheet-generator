const{useState,useRef,useCallback,useEffect}=React;

// Helper: draw a slice of the image with individual transform
function drawSlice(ctx, img, srcY, srcH, dstX, dstY, dstW, dstH, rotation, skewX, originX, originY) {
  ctx.save();
  ctx.translate(originX, originY);
  ctx.rotate(rotation || 0);
  ctx.transform(1, 0, skewX || 0, 1, 0, 0);
  ctx.translate(-originX, -originY);
  ctx.drawImage(img, 0, srcY, img.width, srcH, dstX, dstY, dstW, dstH);
  ctx.restore();
}

// Helper: draw dust particles
function drawDust(ctx, x, y, count, spread, alpha, size) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#aaa';
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + x;
    const dist = Math.random() * spread + spread * 0.3;
    const px = x + Math.cos(angle) * dist;
    const py = y + Math.sin(angle * 0.5) * dist * 0.5;
    const r = size * (0.5 + Math.random() * 0.5);
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// Helper: draw speed lines
function drawSpeedLines(ctx, x, y, w, h, count, alpha, direction) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < count; i++) {
    const ly = y + (i / count) * h;
    const len = 5 + Math.random() * w * 0.3;
    ctx.beginPath();
    if (direction > 0) {
      ctx.moveTo(x - len, ly);
      ctx.lineTo(x, ly);
    } else {
      ctx.moveTo(x + w, ly);
      ctx.lineTo(x + w + len, ly);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// Helper: draw impact star
function drawImpact(ctx, x, y, r, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.4;
    const px = x + Math.cos(angle) * radius;
    const py = y + Math.sin(angle) * radius;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

const ANIMATIONS = {
  idle: {
    label: "Idle",
    desc: "Breathing cycle with body sway",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const cx = size / 2, cy = size / 2;
      const iw = img.width, ih = img.height;
      const topH = Math.floor(ih * 0.45);
      const botH = ih - topH;
      const dx = (size - iw) / 2;
      const dy = (size - ih) / 2;

      // Bottom half: stable, slight horizontal compress on exhale
      const botSx = 1 + Math.sin(t) * 0.01;
      ctx.save();
      ctx.translate(cx, dy + topH);
      ctx.scale(botSx, 1);
      ctx.translate(-cx, -(dy + topH));
      ctx.drawImage(img, 0, topH, iw, botH, dx, dy + topH, iw, botH);
      ctx.restore();

      // Top half: breathe up/down + slight sway
      const breathY = Math.sin(t) * size * 0.015;
      const sway = Math.sin(t * 0.5) * 0.02;
      const topSy = 1 + Math.sin(t) * 0.02;
      ctx.save();
      ctx.translate(cx, dy + topH);
      ctx.rotate(sway);
      ctx.scale(1, topSy);
      ctx.translate(-cx, -(dy + topH));
      ctx.drawImage(img, 0, 0, iw, topH, dx, dy + breathY, iw, topH);
      ctx.restore();
    },
  },
  run: {
    label: "Run",
    desc: "Full run cycle with leg & arm motion",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const iw = img.width, ih = img.height;
      const cx = size / 2;

      const headH = Math.floor(ih * 0.25);
      const torsoH = Math.floor(ih * 0.30);
      const legH = ih - headH - torsoH;

      const dx = (size - iw) / 2;
      const baseY = (size - ih) / 2;

      const bounce = Math.abs(Math.sin(t)) * size * -0.05;
      const lean = Math.sin(t) * 0.12;

      // Legs: skew alternating to simulate running stride
      const legSkew = Math.sin(t) * 0.35;
      const legY = baseY + headH + torsoH + bounce;
      drawSlice(ctx, img, headH + torsoH, legH,
        dx - legSkew * legH * 0.3, legY, iw, legH,
        0, legSkew, cx, legY);

      // Torso: lean forward
      const torsoY = baseY + headH + bounce;
      drawSlice(ctx, img, headH, torsoH,
        dx, torsoY, iw, torsoH,
        lean * 0.5, Math.sin(t) * 0.08, cx, torsoY + torsoH);

      // Head: counter-bob
      const headBob = Math.sin(t * 2) * size * 0.01;
      const headY = baseY + bounce + headBob;
      drawSlice(ctx, img, 0, headH,
        dx, headY, iw, headH,
        lean * 0.3 + Math.sin(t) * 0.05, 0, cx, headY + headH);

      // Dust at feet
      const dustPhase = (frame % total) / total;
      if (Math.abs(Math.sin(t)) > 0.8) {
        drawDust(ctx, cx + Math.sin(t) * 10, baseY + ih + bounce, 4, size * 0.06, 0.3, size * 0.012);
      }

      // Speed lines
      drawSpeedLines(ctx, dx - size * 0.1, baseY + headH + bounce, iw, torsoH + legH, 3, 0.15 + Math.abs(Math.sin(t)) * 0.15, -1);
    },
  },
  walk: {
    label: "Walk",
    desc: "Walking with hip sway & stride",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const iw = img.width, ih = img.height;
      const cx = size / 2;

      const topH = Math.floor(ih * 0.5);
      const botH = ih - topH;
      const dx = (size - iw) / 2;
      const baseY = (size - ih) / 2;

      const bounce = Math.abs(Math.sin(t)) * size * -0.02;
      const hipSway = Math.sin(t) * 0.04;

      // Lower body: stride skew
      const legSkew = Math.sin(t) * 0.2;
      const legY = baseY + topH + bounce;
      drawSlice(ctx, img, topH, botH,
        dx, legY, iw, botH,
        hipSway * 0.5, legSkew, cx, legY);

      // Upper body: counter-sway
      const topY = baseY + bounce;
      const armSwing = Math.sin(t) * 0.06;
      drawSlice(ctx, img, 0, topH,
        dx, topY, iw, topH,
        -hipSway * 0.3, armSwing, cx, topY + topH);
    },
  },
  jump: {
    label: "Jump",
    desc: "Jump with anticipation & landing",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const cx = size / 2;
      const dx = (size - iw) / 2;
      const baseY = (size - ih) / 2;

      const arc = -Math.sin(t * Math.PI) * size * 0.28;

      const topH = Math.floor(ih * 0.5);
      const botH = ih - topH;

      let topSy = 1, botSy = 1, legSkew = 0;

      if (t < 0.15) {
        // Anticipation: crouch
        topSy = 0.85; botSy = 0.85;
        legSkew = 0.1;
      } else if (t < 0.35) {
        // Launch: stretch
        topSy = 1.15; botSy = 0.9;
        legSkew = -0.15;
      } else if (t < 0.65) {
        // Airborne: tuck
        topSy = 1.05; botSy = 0.95;
        legSkew = 0.12;
      } else if (t < 0.85) {
        // Descend: extend legs
        topSy = 1.0; botSy = 1.05;
        legSkew = -0.08;
      } else {
        // Land: squash
        topSy = 0.88; botSy = 0.85;
        legSkew = 0.15;
      }

      const topY = baseY + arc;
      ctx.save();
      ctx.translate(cx, topY + topH);
      ctx.scale(1, topSy);
      ctx.translate(-cx, -(topY + topH));
      ctx.drawImage(img, 0, 0, iw, topH, dx, topY, iw, topH);
      ctx.restore();

      const legY = topY + topH * topSy;
      drawSlice(ctx, img, topH, botH, dx, legY, iw, botH * botSy, 0, legSkew, cx, legY);

      // Landing dust
      if (t > 0.85) {
        const dustAlpha = (t - 0.85) / 0.15;
        drawDust(ctx, cx, baseY + ih, 6, size * 0.1 * dustAlpha, 0.4 * dustAlpha, size * 0.015);
      }
    },
  },
  attack: {
    label: "Attack",
    desc: "Strike with wind-up & follow-through",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const cx = size / 2;
      const dx = (size - iw) / 2;
      const baseY = (size - ih) / 2;

      const topH = Math.floor(ih * 0.45);
      const botH = ih - topH;

      let bodyLean = 0, topSkew = 0, offsetX = 0, botSkew = 0;

      if (t < 0.2) {
        // Wind-up: lean back
        const p = t / 0.2;
        bodyLean = -0.12 * p;
        topSkew = -0.15 * p;
        offsetX = -size * 0.04 * p;
      } else if (t < 0.45) {
        // Strike: lunge forward
        const p = (t - 0.2) / 0.25;
        bodyLean = -0.12 + 0.3 * p;
        topSkew = -0.15 + 0.45 * p;
        offsetX = -size * 0.04 + size * 0.15 * p;
        botSkew = 0.1 * p;
      } else if (t < 0.65) {
        // Impact
        const p = (t - 0.45) / 0.2;
        bodyLean = 0.18 - 0.08 * p;
        topSkew = 0.3 - 0.1 * p;
        offsetX = size * 0.11;
        botSkew = 0.1;
      } else {
        // Recovery
        const p = (t - 0.65) / 0.35;
        bodyLean = 0.1 * (1 - p);
        topSkew = 0.2 * (1 - p);
        offsetX = size * 0.11 * (1 - p);
        botSkew = 0.1 * (1 - p);
      }

      // Legs: planted, slight skew
      drawSlice(ctx, img, topH, botH, dx + offsetX * 0.3, baseY + topH, iw, botH, 0, botSkew, cx, baseY + topH);

      // Upper body: attack motion
      drawSlice(ctx, img, 0, topH, dx + offsetX, baseY, iw, topH, bodyLean, topSkew, cx + offsetX, baseY + topH);

      // Impact effect
      if (t > 0.4 && t < 0.65) {
        const impactAlpha = 1 - ((t - 0.4) / 0.25);
        drawImpact(ctx, dx + iw + offsetX + size * 0.05, baseY + topH * 0.4, size * 0.06, impactAlpha * 0.7);
      }
    },
  },
  death: {
    label: "Death",
    desc: "Collapse with fade & shatter",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const cx = size / 2;
      const dx = (size - iw) / 2;
      const baseY = (size - ih) / 2;

      const topH = Math.floor(ih * 0.4);
      const midH = Math.floor(ih * 0.3);
      const botH = ih - topH - midH;

      const alpha = 1 - t * 0.8;
      ctx.save();
      ctx.globalAlpha = alpha;

      const fallAngle = t * t * 1.2;
      const fallX = t * size * 0.1;
      const fallY = t * t * size * 0.12;

      // Bottom: stays mostly in place, buckles
      drawSlice(ctx, img, topH + midH, botH, dx + fallX * 0.2, baseY + topH + midH + fallY * 0.3, iw, botH, fallAngle * 0.2, t * 0.15, cx, baseY + ih);

      // Mid: starts falling
      drawSlice(ctx, img, topH, midH, dx + fallX * 0.5, baseY + topH + fallY * 0.5, iw, midH, fallAngle * 0.5, t * 0.1, cx, baseY + topH + midH);

      // Top: falls most
      drawSlice(ctx, img, 0, topH, dx + fallX, baseY + fallY, iw, topH, fallAngle, -t * 0.08, cx, baseY + topH);

      ctx.restore();

      // Particles flying off
      if (t > 0.3) {
        const pAlpha = (t - 0.3) * 0.8;
        drawDust(ctx, cx + fallX, baseY + ih * 0.5 + fallY, 5 + Math.floor(t * 8), size * 0.15 * t, pAlpha * 0.4, size * 0.01);
      }
    },
  },
  hit: {
    label: "Hit/Hurt",
    desc: "Knockback with flash & shake",
    generate: (ctx, img, frame, total, size) => {
      const t = frame / Math.max(total - 1, 1);
      const iw = img.width, ih = img.height;
      const cx = size / 2;
      const dx = (size - iw) / 2;
      const baseY = (size - ih) / 2;

      const topH = Math.floor(ih * 0.5);
      const botH = ih - topH;

      const shake = Math.sin(t * Math.PI * 6) * size * 0.04 * (1 - t);
      const knockback = Math.sin(t * Math.PI) * size * -0.06;
      const recoil = Math.sin(t * Math.PI) * -0.15;

      // Lower: slight buckle
      drawSlice(ctx, img, topH, botH, dx + shake * 0.3 + knockback * 0.3, baseY + topH, iw, botH, recoil * 0.3, 0, cx, baseY + topH);

      // Upper: major recoil
      drawSlice(ctx, img, 0, topH, dx + shake + knockback, baseY, iw, topH, recoil, -0.05 * Math.sin(t * Math.PI), cx + knockback, baseY + topH);

      // White flash overlay
      if (t < 0.3) {
        const flashAlpha = (1 - t / 0.3) * 0.6;
        ctx.save();
        ctx.globalAlpha = flashAlpha;
        ctx.globalCompositeOperation = 'source-atop';
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, size, size);
        ctx.restore();
      }

      // Hit spark
      if (t < 0.4) {
        drawImpact(ctx, dx + iw * 0.3, baseY + topH * 0.3, size * 0.07 * (1 - t / 0.4), 0.8 * (1 - t / 0.4));
      }
    },
  },
  spin: {
    label: "Spin",
    desc: "Full rotation with perspective",
    generate: (ctx, img, frame, total, size) => {
      const t = (frame / total) * Math.PI * 2;
      const iw = img.width, ih = img.height;
      const dx = (size - iw) / 2;
      const baseY = (size - ih) / 2;
      const cx = size / 2;

      const scaleX = Math.cos(t);
      const absScale = Math.abs(scaleX);

      // Segment the character for 3D-ish rotation
      const segments = 6;
      const segH = ih / segments;

      for (let i = 0; i < segments; i++) {
        const segPhase = t + (i / segments) * 0.15;
        const segScaleX = Math.cos(segPhase);
        const segW = iw * Math.abs(segScaleX);
        const segDx = cx - segW / 2;

        ctx.save();
        if (segScaleX < 0) {
          ctx.translate(cx, 0);
          ctx.scale(-1, 1);
          ctx.translate(-cx, 0);
        }
        ctx.drawImage(img, 0, i * segH, iw, segH, segDx, baseY + i * segH, segW, segH);
        ctx.restore();
      }

      // Motion blur lines during fast part
      const speed = Math.abs(Math.sin(t));
      if (speed > 0.7) {
        drawSpeedLines(ctx, dx - 10, baseY, iw, ih, 4, (speed - 0.7) * 0.5, scaleX > 0 ? -1 : 1);
      }
    },
  },
};
