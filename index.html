<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprite Sheet Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;

// ============================================================
// AI POSE DETECTOR - MoveNet in-browser
// Returns 17 keypoints: nose, eyes, ears, shoulders, elbows,
// wrists, hips, knees, ankles with x,y,score
// ============================================================
var _poseDetector = null;
var _detectorLoading = false;
var _detectorCallbacks = [];

function getPoseDetector() {
  return new Promise(function(resolve, reject) {
    if (_poseDetector) { resolve(_poseDetector); return; }
    _detectorCallbacks.push({resolve:resolve, reject:reject});
    if (_detectorLoading) return;
    _detectorLoading = true;
    console.log("Loading MoveNet pose detector...");
    poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER }
    ).then(function(d) {
      _poseDetector = d;
      console.log("MoveNet loaded");
      _detectorCallbacks.forEach(function(cb){cb.resolve(d);});
      _detectorCallbacks = [];
    }).catch(function(e) {
      console.error("MoveNet load failed:", e);
      _detectorCallbacks.forEach(function(cb){cb.reject(e);});
      _detectorCallbacks = [];
      _detectorLoading = false;
    });
  });
}

// MoveNet keypoint indices
var KP = {NOSE:0,L_EYE:1,R_EYE:2,L_EAR:3,R_EAR:4,L_SHOULDER:5,R_SHOULDER:6,
  L_ELBOW:7,R_ELBOW:8,L_WRIST:9,R_WRIST:10,L_HIP:11,R_HIP:12,
  L_KNEE:13,R_KNEE:14,L_ANKLE:15,R_ANKLE:16};

async function detectPose(img) {
  var detector = await getPoseDetector();
  // MoveNet needs an actual visible image element or canvas
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var poses = await detector.estimatePoses(c);
  if (!poses || poses.length === 0) return null;
  var kps = poses[0].keypoints;
  // Check confidence
  var avgScore = kps.reduce(function(s,k){return s+k.score;},0)/kps.length;
  console.log("Pose detected, avg confidence:", avgScore.toFixed(2));
  return { keypoints: kps, width: img.width, height: img.height, avgScore: avgScore };
}


// ============================================================
// BODY PART EXTRACTOR - Soft Weighted Masks
// Each pixel gets smooth influence weights from all body parts
// No hard cuts - parts blend at boundaries
// ============================================================
function extractBodyParts(img, poseData) {
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var id = ctx.getImageData(0, 0, c.width, c.height);
  var d = id.data;
  var w = c.width, h = c.height;

  // Build row profile
  var rows = [];
  for (var y=0;y<h;y++) {
    var left=-1,right=-1,count=0;
    for (var x=0;x<w;x++) {
      if(d[(y*w+x)*4+3]>30){if(left<0)left=x;right=x;count++;}
    }
    rows.push({left:left,right:right,width:left>=0?right-left+1:0,cx:left>=0?(left+right)/2:w/2});
  }
  var topY=0,botY=h-1;
  for(var y2=0;y2<h;y2++){if(rows[y2].width>0){topY=y2;break;}}
  for(var y3=h-1;y3>=0;y3--){if(rows[y3].width>0){botY=y3;break;}}
  var charH=botY-topY+1;
  if(charH<8) return null;

  // Get joint positions from AI or heuristics
  var joints = {};
  var aiUsed = false;

  if (poseData && poseData.avgScore > 0.15) {
    var kps = poseData.keypoints;
    var conf = function(i){return kps[i].score > 0.1;};
    var kx = function(i){return kps[i].x;};
    var ky = function(i){return kps[i].y;};
    var noseY = conf(KP.NOSE) ? ky(KP.NOSE) : topY;
    joints.neckX = (conf(KP.L_SHOULDER)&&conf(KP.R_SHOULDER)) ? (kx(KP.L_SHOULDER)+kx(KP.R_SHOULDER))/2 : w/2;
    joints.neckY = (conf(KP.L_SHOULDER)&&conf(KP.R_SHOULDER)) ? Math.min(ky(KP.L_SHOULDER),ky(KP.R_SHOULDER))-charH*0.02 : topY+charH*0.28;
    joints.headTop = Math.max(topY, noseY - (joints.neckY - noseY)*0.8);
    joints.lShoulder = conf(KP.L_SHOULDER)?{x:kx(KP.L_SHOULDER),y:ky(KP.L_SHOULDER)}:{x:w*0.35,y:topY+charH*0.28};
    joints.rShoulder = conf(KP.R_SHOULDER)?{x:kx(KP.R_SHOULDER),y:ky(KP.R_SHOULDER)}:{x:w*0.65,y:topY+charH*0.28};
    joints.lHip = conf(KP.L_HIP)?{x:kx(KP.L_HIP),y:ky(KP.L_HIP)}:{x:w*0.4,y:topY+charH*0.55};
    joints.rHip = conf(KP.R_HIP)?{x:kx(KP.R_HIP),y:ky(KP.R_HIP)}:{x:w*0.6,y:topY+charH*0.55};
    joints.lKnee = conf(KP.L_KNEE)?{x:kx(KP.L_KNEE),y:ky(KP.L_KNEE)}:null;
    joints.rKnee = conf(KP.R_KNEE)?{x:kx(KP.R_KNEE),y:ky(KP.R_KNEE)}:null;
    joints.crotchY = (joints.lHip.y+joints.rHip.y)/2;
    joints.crotchX = (joints.lHip.x+joints.rHip.x)/2;
    aiUsed = true;
  } else {
    var sw=[];
    for(var i=0;i<h;i++){var sum=0,cnt=0;for(var j=Math.max(0,i-2);j<=Math.min(h-1,i+2);j++){sum+=rows[j].width;cnt++;}sw.push(sum/cnt);}
    var headMaxW=0,headMaxY=topY;
    for(var y4=topY;y4<topY+Math.floor(charH*0.35);y4++){if(sw[y4]>headMaxW){headMaxW=sw[y4];headMaxY=y4;}}
    var nkY=headMaxY,nkW=headMaxW;
    for(var y5=headMaxY+1;y5<topY+Math.floor(charH*0.4);y5++){if(sw[y5]<nkW&&sw[y5]>0){nkW=sw[y5];nkY=y5;}if(sw[y5]>nkW*1.3&&y5>headMaxY+2)break;}
    var shY=nkY,shW=0;
    for(var y6=topY+Math.floor(charH*0.2);y6<topY+Math.floor(charH*0.5);y6++){if(sw[y6]>shW){shW=sw[y6];shY=y6;}}
    var hiY=shY,hiW=0;
    for(var y8=topY+Math.floor(charH*0.4);y8<topY+Math.floor(charH*0.65);y8++){if(sw[y8]>hiW){hiW=sw[y8];hiY=y8;}}
    var crY=hiY+Math.floor((botY-hiY)*0.1);
    var ctrX=Math.round(w/2);
    for(var y9=hiY;y9<botY-2;y9++){var cc=0,cl=Math.max(0,ctrX-Math.floor(w*0.06)),cr=Math.min(w-1,ctrX+Math.floor(w*0.06));for(var x2=cl;x2<=cr;x2++){if(d[(y9*w+x2)*4+3]>30)cc++;}if(cc<(cr-cl+1)*0.35&&y9>hiY+2){crY=y9;break;}}
    var shRow=rows[shY];
    joints.headTop=topY; joints.neckX=shRow?shRow.cx:w/2; joints.neckY=nkY;
    joints.lShoulder={x:shRow?shRow.left+shW*0.15:w*0.3,y:shY};
    joints.rShoulder={x:shRow?shRow.right-shW*0.15:w*0.7,y:shY};
    joints.lHip={x:w*0.4,y:hiY}; joints.rHip={x:w*0.6,y:hiY};
    joints.crotchY=crY; joints.crotchX=w/2;
  }

  // Define part "centers" for soft weighting
  var shoulderMidY=(joints.lShoulder.y+joints.rShoulder.y)/2;
  var headCy=(joints.headTop+joints.neckY)/2 || topY+charH*0.12;
  var headCx=joints.neckX;
  var torsoCy=(shoulderMidY+joints.crotchY)/2;
  var torsoCx=joints.neckX;
  var lArmCx=joints.lShoulder.x-charH*0.08;
  var lArmCy=(joints.lShoulder.y+joints.crotchY*0.6+joints.lShoulder.y*0.4)/2;
  var rArmCx=joints.rShoulder.x+charH*0.08;
  var rArmCy=lArmCy;
  var lLegCx=joints.lHip.x;
  var lLegCy=(joints.crotchY+botY)/2;
  var rLegCx=joints.rHip.x;
  var rLegCy=lLegCy;

  // Soft weight radius for each part (how far influence extends)
  var headR=charH*0.22;
  var torsoR=charH*0.35;
  var armR=charH*0.28;
  var legR=charH*0.35;

  // For each pixel, compute weight for each part
  // Weight = max(0, 1 - dist/radius)^2 (smooth falloff)
  // Plus directional bias so parts stay in their zone
  var partNames=["head","torso","leftArm","rightArm","leftLeg","rightLeg"];
  var partCenters=[
    {cx:headCx,cy:headCy,r:headR},
    {cx:torsoCx,cy:torsoCy,r:torsoR},
    {cx:lArmCx,cy:lArmCy,r:armR},
    {cx:rArmCx,cy:rArmCy,r:armR},
    {cx:lLegCx,cy:lLegCy,r:legR},
    {cx:rLegCx,cy:rLegCy,r:legR}
  ];

  var pivots = {
    head:{x:joints.neckX, y:joints.neckY},
    torso:{x:joints.neckX, y:(shoulderMidY+joints.crotchY)/2},
    leftArm:{x:joints.lShoulder.x, y:joints.lShoulder.y},
    rightArm:{x:joints.rShoulder.x, y:joints.rShoulder.y},
    leftLeg:{x:joints.lHip.x, y:joints.crotchY},
    rightLeg:{x:joints.rHip.x, y:joints.crotchY}
  };

  // Create part canvases with soft weighted alpha
  var parts = {};
  for (var pi=0; pi<6; pi++) {
    var name = partNames[pi];
    var pc = document.createElement("canvas");
    pc.width = w; pc.height = h;
    var pctx = pc.getContext("2d");
    var pid = pctx.createImageData(w, h);
    var pd = pid.data;
    var center = partCenters[pi];

    for (var py=0; py<h; py++) {
      for (var px=0; px<w; px++) {
        var idx = py*w+px;
        var srcA = d[idx*4+3];
        if (srcA <= 10) continue;

        // Distance from this part's center
        var dx = px - center.cx;
        var dy = py - center.cy;
        var dist = Math.sqrt(dx*dx + dy*dy);
        var weight = Math.max(0, 1 - dist/center.r);
        weight = weight * weight; // smooth falloff

        // Zone bonus: increase weight if pixel is in the expected zone
        if (pi === 0) { // head: above neck
          if (py < joints.neckY + charH*0.05) weight = Math.max(weight, 0.9);
          else weight *= 0.3;
        } else if (pi === 1) { // torso: between neck and crotch, center
          if (py > joints.neckY-charH*0.03 && py < joints.crotchY+charH*0.03) {
            var tMid = (joints.lShoulder.x+joints.rShoulder.x)/2;
            var tHalf = Math.abs(joints.rShoulder.x-joints.lShoulder.x)/2*1.1;
            if (Math.abs(px-tMid) < tHalf) weight = Math.max(weight, 0.8);
          }
        } else if (pi === 2) { // left arm: left side, shoulder to hip
          if (px < joints.neckX-charH*0.02 && py > joints.lShoulder.y-charH*0.05 && py < joints.crotchY+charH*0.1) weight = Math.max(weight, 0.7);
          if (px > joints.neckX+charH*0.05) weight *= 0.1;
        } else if (pi === 3) { // right arm: right side
          if (px > joints.neckX+charH*0.02 && py > joints.rShoulder.y-charH*0.05 && py < joints.crotchY+charH*0.1) weight = Math.max(weight, 0.7);
          if (px < joints.neckX-charH*0.05) weight *= 0.1;
        } else if (pi === 4) { // left leg: below crotch, left
          if (py > joints.crotchY-charH*0.05 && px < joints.crotchX+charH*0.05) weight = Math.max(weight, 0.8);
          if (py < joints.crotchY-charH*0.1) weight *= 0.15;
        } else if (pi === 5) { // right leg: below crotch, right
          if (py > joints.crotchY-charH*0.05 && px > joints.crotchX-charH*0.05) weight = Math.max(weight, 0.8);
          if (py < joints.crotchY-charH*0.1) weight *= 0.15;
        }

        weight = Math.max(0, Math.min(1, weight));
        if (weight < 0.01) continue;

        var si = idx*4;
        pd[si] = d[si];
        pd[si+1] = d[si+1];
        pd[si+2] = d[si+2];
        pd[si+3] = Math.round(srcA * weight);
      }
    }
    pctx.putImageData(pid, 0, 0);
    var partImg = new Image();
    partImg.src = pc.toDataURL();
    partImg.width = w; partImg.height = h;
    parts[name] = {img: partImg, pivot: pivots[name]};
  }

  return {
    parts: parts, width: w, height: h, aiUsed: aiUsed,
    landmarks: {
      topY:topY/h, neckY:joints.neckY/h, shoulderY:shoulderMidY/h,
      hipY:joints.crotchY/h, botY:botY/h
    }
  };
}


// ============================================================
// DRAWING ENGINE
// ============================================================
function drawPartImg(ctx, partData, imgW, imgH, size, rot, ox, oy, alpha) {
  var img = partData.img;
  var px = partData.pivot.x;
  var py = partData.pivot.y;
  var drawOx = (size - imgW) / 2;
  var drawOy = (size - imgH) / 2;
  var pivotX = drawOx + px + (ox||0);
  var pivotY = drawOy + py + (oy||0);
  ctx.save();
  if (alpha !== undefined && alpha < 1) ctx.globalAlpha = alpha;
  ctx.translate(pivotX, pivotY);
  ctx.rotate(rot || 0);
  ctx.translate(-pivotX, -pivotY);
  ctx.drawImage(img, 0, 0, imgW, imgH, drawOx+(ox||0), drawOy+(oy||0), imgW, imgH);
  ctx.restore();
}

function drawAnimChar(ctx, bd, size, pose) {
  if (!bd || !bd.parts) return;
  var iw = bd.width, ih = bd.height;
  var bx=pose.bx||0, by=pose.by||0;
  var al = pose.alpha!==undefined ? pose.alpha : 1;
  var order = ["rightLeg","rightArm","torso","head","leftArm","leftLeg"];
  order.forEach(function(name) {
    var part = bd.parts[name];
    if (!part||!part.img) return;
    var pr = pose[name] || {};
    var ox = bx+(pr.ox||0), oy = by+(pr.oy||0);
    if (name==="head"){var tr=pose.torso||{}; ox+=(tr.ox||0)*0.4; oy+=(tr.oy||0)*0.4;}
    drawPartImg(ctx, part, iw, ih, size, pr.rot||0, ox, oy, al);
  });
}

function drawCharFallback(ctx, img, size, pose) {
  var iw=img.width,ih=img.height,ox=(size-iw)/2,oy=(size-ih)/2;
  ctx.save();
  if(pose.alpha!==undefined) ctx.globalAlpha=pose.alpha;
  ctx.drawImage(img,0,0,iw,ih,ox+(pose.bx||0),oy+(pose.by||0),iw,ih);
  ctx.restore();
}

function drawDust(ctx,x,y,n,s,a,sz){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#aaa';for(var i=0;i<n;i++){var an=(i/n)*Math.PI*2,d2=s*(0.3+Math.random()*0.7);ctx.beginPath();ctx.arc(x+Math.cos(an)*d2,y-Math.random()*s*0.3,sz*(0.5+Math.random()),0,Math.PI*2);ctx.fill();}ctx.restore();}
function drawShadow(ctx,size){ctx.save();ctx.beginPath();ctx.ellipse(size/2,size*0.88,size*0.28,size*0.04,0,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.22)";ctx.fill();ctx.restore();}
function drawSpark(ctx,x,y,r,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#fff';ctx.lineWidth=2;for(var i=0;i<6;i++){var an=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(x+Math.cos(an)*r*0.25,y+Math.sin(an)*r*0.25);ctx.lineTo(x+Math.cos(an)*r,y+Math.sin(an)*r);ctx.stroke();}ctx.restore();}


var ANIMATIONS = {
  idle: { label:"Idle", desc:"Breathing & weight shift", generate: function(ctx,img,f,tot,sz,bd) {
    var t=(f/tot)*Math.PI*2;
    var breathe=Math.sin(t), shift=Math.sin(t*0.5);
    var pose = {
      head:{rot:shift*0.02, oy:breathe*-1.5},
      torso:{rot:shift*0.015, oy:breathe*-1},
      leftArm:{rot:0.05+breathe*0.04+shift*0.03},
      rightArm:{rot:-0.05-breathe*0.04-shift*0.03},
      leftLeg:{rot:shift*0.03},
      rightLeg:{rot:-shift*0.03},
      by:breathe*-1
    };
    if(bd) drawAnimChar(ctx,bd,sz,pose); else drawCharFallback(ctx,img,sz,pose);
  }},
  run: { label:"Run", desc:"Full sprint cycle", generate: function(ctx,img,f,tot,sz,bd) {
    var t=(f/tot)*Math.PI*2;
    var contactPhase=Math.cos(t*2);
    var bounce=(-Math.abs(Math.sin(t))*0.04+(contactPhase>0.5?-0.015:0))*sz;
    var lean=0.08;
    var lp=Math.sin(t);
    var lf=lp>0?Math.pow(lp,0.7):-Math.pow(-lp,0.7);
    var pose = {
      head:{rot:lean*0.3+Math.sin(t*2)*0.02, oy:bounce*0.4},
      torso:{rot:lean+Math.sin(t)*0.06, oy:bounce*0.3},
      leftArm:{rot:-lf*0.85+lean*0.5},
      rightArm:{rot:lf*0.85+lean*0.5},
      leftLeg:{rot:lf*0.8},
      rightLeg:{rot:-lf*0.8},
      by:bounce
    };
    if(bd) drawAnimChar(ctx,bd,sz,pose); else drawCharFallback(ctx,img,sz,pose);
    if(Math.abs(Math.sin(t))>0.92) drawDust(ctx,sz/2+Math.sin(t)*6,sz*0.88+bounce,5,sz*0.06,0.35,sz*0.01);
  }},
  walk: { label:"Walk", desc:"Natural walking gait", generate: function(ctx,img,f,tot,sz,bd) {
    var t=(f/tot)*Math.PI*2;
    var bounce=Math.sin(t*2+Math.PI/2)*sz*0.012;
    var hipSway=Math.sin(t)*sz*0.008;
    var ls=Math.sin(t), twist=Math.sin(t)*0.04;
    var pose = {
      head:{rot:-twist*0.3, ox:-hipSway*0.3},
      torso:{rot:twist, ox:hipSway},
      leftArm:{rot:-ls*0.35-0.05},
      rightArm:{rot:ls*0.35+0.05},
      leftLeg:{rot:ls*0.45},
      rightLeg:{rot:-ls*0.45},
      by:bounce
    };
    if(bd) drawAnimChar(ctx,bd,sz,pose); else drawCharFallback(ctx,img,sz,pose);
  }},
  jump: { label:"Jump", desc:"Squat, launch, peak, land", generate: function(ctx,img,f,tot,sz,bd) {
    var t=f/Math.max(tot-1,1);
    var arc=-Math.sin(t*Math.PI)*sz*0.24;
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{},by:arc};
    if(t<0.18){var q=t/0.18,e=q*q; p.torso={rot:e*0.08,oy:e*sz*0.03}; p.leftLeg={rot:e*0.35}; p.rightLeg={rot:-e*0.35}; p.leftArm={rot:e*0.5}; p.rightArm={rot:-e*0.5}; p.head={rot:-e*0.04};}
    else if(t<0.35){var q=(t-0.18)/0.17,e=1-Math.pow(1-q,2); p.torso={rot:0.08*(1-e)-e*0.05,oy:0.03*sz*(1-e)}; p.leftLeg={rot:0.35*(1-e)-e*0.2}; p.rightLeg={rot:-0.35*(1-e)+e*0.2}; p.leftArm={rot:0.5-e*1.3}; p.rightArm={rot:-0.5+e*1.3}; p.head={rot:-0.04+e*0.06};}
    else if(t<0.65){var q=(t-0.35)/0.3,tk=Math.sin(q*Math.PI); p.leftArm={rot:-0.8-tk*0.2}; p.rightArm={rot:0.8+tk*0.2}; p.leftLeg={rot:tk*0.5}; p.rightLeg={rot:tk*0.5}; p.torso={rot:-0.05}; p.head={rot:0.02};}
    else if(t<0.82){var q=(t-0.65)/0.17; p.leftLeg={rot:-q*0.2}; p.rightLeg={rot:q*0.2}; p.leftArm={rot:-0.8+q*0.5}; p.rightArm={rot:0.8-q*0.5}; p.head={rot:q*0.04};}
    else{var q=(t-0.82)/0.18,imp=Math.sin(q*Math.PI*0.5); p.torso={rot:imp*0.1,oy:imp*sz*0.03}; p.leftLeg={rot:imp*0.4}; p.rightLeg={rot:-imp*0.4}; p.leftArm={rot:imp*0.3}; p.rightArm={rot:-imp*0.3}; p.head={rot:-imp*0.05};}
    if(bd) drawAnimChar(ctx,bd,sz,p); else drawCharFallback(ctx,img,sz,p);
    if(t>0.85){var q2=(t-0.85)/0.15; drawDust(ctx,sz/2,sz*0.88+arc,4+Math.floor(q2*6),sz*0.1*q2,0.35*q2,sz*0.012);}
  }},
  attack: { label:"Attack", desc:"Slash with full body", generate: function(ctx,img,f,tot,sz,bd) {
    var t=f/Math.max(tot-1,1);
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{}};
    if(t<0.3){var q=t/0.3,e=1-Math.pow(1-q,2); p.torso={rot:-e*0.18,ox:-e*sz*0.02}; p.rightArm={rot:-e*1.5}; p.leftArm={rot:e*0.4}; p.rightLeg={rot:-e*0.2}; p.leftLeg={rot:e*0.15}; p.head={rot:-e*0.08};}

function removeBackground(img, tolerance) {
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var id = ctx.getImageData(0, 0, c.width, c.height);
  var d = id.data;
  var w = c.width, h = c.height;
  var tol = tolerance || 30;
  var visited = new Uint8Array(w * h);

  // Get background color samples from corners
  function getPixel(x, y) { var i = (y * w + x) * 4; return [d[i], d[i+1], d[i+2], d[i+3]]; }
  function colorDist(a, b) { return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) + Math.abs(a[2]-b[2]); }

  // Sample multiple corner pixels to get reliable bg color
  var samples = [];
  var margin = Math.max(1, Math.floor(Math.min(w, h) * 0.02));
  for (var sy = 0; sy < margin; sy++) {
    for (var sx = 0; sx < margin; sx++) {
      samples.push(getPixel(sx, sy));
      samples.push(getPixel(w - 1 - sx, sy));
      samples.push(getPixel(sx, h - 1 - sy));
      samples.push(getPixel(w - 1 - sx, h - 1 - sy));
    }
  }
  // Average bg color
  var bg = [0,0,0];
  samples.forEach(function(s) { bg[0] += s[0]; bg[1] += s[1]; bg[2] += s[2]; });
  bg[0] = Math.round(bg[0] / samples.length);
  bg[1] = Math.round(bg[1] / samples.length);
  bg[2] = Math.round(bg[2] / samples.length);

  // Flood fill from all edges
  var queue = [];
  for (var x = 0; x < w; x++) { queue.push(x); queue.push(0); queue.push(x); queue.push(h-1); }
  for (var y = 0; y < h; y++) { queue.push(0); queue.push(y); queue.push(w-1); queue.push(y); }

  var qi = 0;
  while (qi < queue.length) {
    var px = queue[qi++], py = queue[qi++];
    if (px < 0 || px >= w || py < 0 || py >= h) continue;
    var idx = py * w + px;
    if (visited[idx]) continue;
    var pix = getPixel(px, py);
    if (colorDist(pix, bg) > tol && pix[3] > 10) continue;
    visited[idx] = 1;
    var pi = idx * 4;
    d[pi + 3] = 0; // set alpha to 0
    queue.push(px-1); queue.push(py);
    queue.push(px+1); queue.push(py);
    queue.push(px); queue.push(py-1);
    queue.push(px); queue.push(py+1);
  }

  // Soften edges: semi-transparent border pixels
  for (var y2 = 1; y2 < h-1; y2++) {
    for (var x2 = 1; x2 < w-1; x2++) {
      var ci = y2 * w + x2;
      if (visited[ci]) continue;
      var neighbors = 0;
      if (visited[ci-1]) neighbors++;
      if (visited[ci+1]) neighbors++;
      if (visited[ci-w]) neighbors++;
      if (visited[ci+w]) neighbors++;
      if (neighbors > 0 && neighbors < 4) {
        d[ci * 4 + 3] = Math.round(d[ci * 4 + 3] * (1 - neighbors * 0.2));
      }
    }
  }

  ctx.putImageData(id, 0, 0);
  var result = new Image();
  result.src = c.toDataURL();
  result.width = c.width;
  result.height = c.height;
  return result;
}
