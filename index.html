<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprite Sheet Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;

// ============================================================
// SILHOUETTE ANALYZER
// Scans pixel data to find body landmarks: head top, neck,
// shoulders, waist, hips, leg split, feet. Returns bodyMap.
// ============================================================
function analyzeSilhouette(img) {
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var id = ctx.getImageData(0, 0, c.width, c.height);
  var d = id.data;
  var w = c.width, h = c.height;

  // Build per-row width profile: for each row, find leftmost and rightmost opaque pixel
  var rows = [];
  for (var y = 0; y < h; y++) {
    var left = -1, right = -1, count = 0;
    for (var x = 0; x < w; x++) {
      if (d[(y * w + x) * 4 + 3] > 30) {
        if (left < 0) left = x;
        right = x;
        count++;
      }
    }
    rows.push({ left: left, right: right, width: left >= 0 ? right - left + 1 : 0, count: count, cx: left >= 0 ? (left + right) / 2 : w / 2 });
  }

  // Find character bounding box
  var topY = 0, botY = h - 1;
  for (var y2 = 0; y2 < h; y2++) { if (rows[y2].width > 0) { topY = y2; break; } }
  for (var y3 = h - 1; y3 >= 0; y3--) { if (rows[y3].width > 0) { botY = y3; break; } }
  var charH = botY - topY + 1;
  if (charH < 4) return null; // too small

  // Smooth the width profile
  var smoothW = [];
  for (var i = 0; i < h; i++) {
    var sum = 0, cnt = 0;
    for (var j = Math.max(0, i - 2); j <= Math.min(h - 1, i + 2); j++) {
      sum += rows[j].width; cnt++;
    }
    smoothW.push(sum / cnt);
  }

  // Find key landmarks by scanning the profile
  var maxWidth = 0, maxWidthY = topY;
  for (var y4 = topY; y4 <= botY; y4++) {
    if (smoothW[y4] > maxWidth) { maxWidth = smoothW[y4]; maxWidthY = y4; }
  }

  // HEAD: from top until first significant narrowing (neck)
  // Scan down from top, find where width first drops significantly after initial mass
  var headMaxW = 0, headMaxY = topY;
  var scanEnd = Math.min(topY + Math.floor(charH * 0.45), botY);
  for (var y5 = topY; y5 < scanEnd; y5++) {
    if (smoothW[y5] > headMaxW) { headMaxW = smoothW[y5]; headMaxY = y5; }
  }

  // Find neck: narrowest point between head peak and 45% down
  var neckY = headMaxY, neckW = headMaxW;
  var neckSearchEnd = Math.min(topY + Math.floor(charH * 0.4), botY);
  for (var y6 = headMaxY + 1; y6 < neckSearchEnd; y6++) {
    if (smoothW[y6] < neckW && smoothW[y6] > 0) {
      neckW = smoothW[y6]; neckY = y6;
    }
    // Stop if width starts increasing significantly (found neck, now shoulders)
    if (smoothW[y6] > neckW * 1.3 && y6 > headMaxY + 2) break;
  }

  // SHOULDERS: widest point in upper 35-55% of character
  var shoulderY = neckY, shoulderW = 0;
  var shStart = Math.max(neckY, topY + Math.floor(charH * 0.2));
  var shEnd = Math.min(topY + Math.floor(charH * 0.5), botY);
  for (var y7 = shStart; y7 < shEnd; y7++) {
    if (smoothW[y7] > shoulderW) { shoulderW = smoothW[y7]; shoulderY = y7; }
  }

  // WAIST: narrowest point between shoulders and 70%
  var waistY = shoulderY, waistW = shoulderW;
  var waistEnd = Math.min(topY + Math.floor(charH * 0.7), botY);
  for (var y8 = shoulderY + 1; y8 < waistEnd; y8++) {
    if (smoothW[y8] < waistW && smoothW[y8] > 0) {
      waistW = smoothW[y8]; waistY = y8;
    }
  }

  // HIPS: widest point in 45-65% zone
  var hipY = waistY, hipW = 0;
  var hipStart = Math.max(waistY, topY + Math.floor(charH * 0.4));
  var hipEnd = Math.min(topY + Math.floor(charH * 0.65), botY);
  for (var y9 = hipStart; y9 < hipEnd; y9++) {
    if (smoothW[y9] > hipW) { hipW = smoothW[y9]; hipY = y9; }
  }

  // LEG SPLIT: find where the silhouette splits into two masses
  // Scan from hips down looking for a gap or significant dip in the center column
  var centerX = Math.round(w / 2);
  var splitY = hipY + Math.floor((botY - hipY) * 0.15); // default
  for (var y10 = hipY; y10 < botY - 2; y10++) {
    // Check if center region has a gap
    var centerCount = 0;
    var checkL = Math.max(0, centerX - Math.floor(w * 0.08));
    var checkR = Math.min(w - 1, centerX + Math.floor(w * 0.08));
    for (var x2 = checkL; x2 <= checkR; x2++) {
      if (d[(y10 * w + x2) * 4 + 3] > 30) centerCount++;
    }
    var totalW = checkR - checkL + 1;
    if (centerCount < totalW * 0.3 && y10 > hipY + 3) {
      splitY = y10;
      break;
    }
    // Also detect: left half and right half both have mass but center is thin
    if (rows[y10].width > 0) {
      var leftMass = 0, rightMass = 0;
      var mid = Math.round(rows[y10].cx);
      for (var x3 = rows[y10].left; x3 < mid; x3++) {
        if (d[(y10 * w + x3) * 4 + 3] > 30) leftMass++;
      }
      for (var x4 = mid; x4 <= rows[y10].right; x4++) {
        if (d[(y10 * w + x4) * 4 + 3] > 30) rightMass++;
      }
      if (leftMass > 2 && rightMass > 2 && centerCount < totalW * 0.5 && y10 > hipY + 3) {
        splitY = y10;
        break;
      }
    }
  }

  // Convert to fractions
  var nf = function(v, max) { return Math.max(0, Math.min(1, v / max)); };
  var headBot = nf(neckY + 2, h);
  var torsoTop = nf(neckY - 2, h);
  var shoulderFrac = nf(shoulderY, h);
  var hipFrac = nf(hipY, h);
  var splitFrac = nf(splitY, h);

  // Arm horizontal bounds from silhouette at shoulder height
  var shRow = rows[shoulderY] || rows[Math.round((topY + botY) * 0.35)];
  var shLeft = shRow ? nf(shRow.left, w) : 0;
  var shRight = shRow ? nf(shRow.right, w) : 1;
  var shCx = shRow ? nf(shRow.cx, w) : 0.5;
  var armSplit = 0.33; // arms are outer 33% each side

  return {
    head: {
      l: Math.max(0, shCx - 0.35), t: nf(topY, h),
      r: Math.min(1, shCx + 0.35), b: headBot + 0.02,
      px: shCx, py: headBot
    },
    torso: {
      l: Math.max(0, shLeft - 0.02), t: torsoTop,
      r: Math.min(1, shRight + 0.02), b: splitFrac + 0.03,
      px: shCx, py: (shoulderFrac + hipFrac) / 2
    },
    leftArm: {
      l: Math.max(0, shLeft - 0.03), t: torsoTop - 0.02,
      r: Math.min(shCx - 0.05, shLeft + (shRight - shLeft) * armSplit),
      b: splitFrac + 0.02,
      px: shLeft + (shRight - shLeft) * 0.12, py: shoulderFrac
    },
    rightArm: {
      l: Math.max(shCx + 0.05, shRight - (shRight - shLeft) * armSplit),
      t: torsoTop - 0.02,
      r: Math.min(1, shRight + 0.03), b: splitFrac + 0.02,
      px: shRight - (shRight - shLeft) * 0.12, py: shoulderFrac
    },
    leftLeg: {
      l: Math.max(0, shLeft - 0.02), t: splitFrac - 0.04,
      r: shCx + 0.04, b: nf(botY + 1, h),
      px: shCx - (shCx - shLeft) * 0.4, py: splitFrac
    },
    rightLeg: {
      l: shCx - 0.04, t: splitFrac - 0.04,
      r: Math.min(1, shRight + 0.02), b: nf(botY + 1, h),
      px: shCx + (shRight - shCx) * 0.4, py: splitFrac
    },
    // Extra debug info
    _landmarks: { topY: nf(topY,h), neckY: headBot, shoulderY: shoulderFrac, waistY: nf(waistY,h), hipY: hipFrac, splitY: splitFrac, botY: nf(botY,h) }
  };
}


// ============================================================
// DRAWING ENGINE
// ============================================================
function drawPart(ctx, img, region, pivotX, pivotY, rot, ox, oy, alpha) {
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.translate(pivotX, pivotY);
  ctx.rotate(rot || 0);
  ctx.translate(-pivotX, -pivotY);
  ctx.drawImage(img, region.sx, region.sy, region.sw, region.sh,
    region.dx + (ox||0), region.dy + (oy||0), region.dw, region.dh);
  ctx.restore();
}

function getParts(img, size, bodyMap) {
  var iw = img.width, ih = img.height;
  var ox = (size - iw) / 2, oy = (size - ih) / 2;
  var m = bodyMap || {
    head:{l:0.15,t:0,r:0.85,b:0.28,px:0.5,py:0.28},
    torso:{l:0.1,t:0.24,r:0.9,b:0.54,px:0.5,py:0.39},
    leftArm:{l:0,t:0.2,r:0.3,b:0.55,px:0.22,py:0.22},
    rightArm:{l:0.7,t:0.2,r:1,b:0.55,px:0.78,py:0.22},
    leftLeg:{l:0,t:0.5,r:0.5,b:1,px:0.35,py:0.5},
    rightLeg:{l:0.5,t:0.5,r:1,b:1,px:0.65,py:0.5}
  };
  var result = {};
  ["head","torso","leftArm","rightArm","leftLeg","rightLeg"].forEach(function(n) {
    var p = m[n];
    result[n] = {
      r: { sx:iw*p.l, sy:ih*p.t, sw:iw*(p.r-p.l), sh:ih*(p.b-p.t),
           dx:ox+iw*p.l, dy:oy+ih*p.t, dw:iw*(p.r-p.l), dh:ih*(p.b-p.t) },
      px: ox+iw*p.px, py: oy+ih*p.py
    };
  });
  return result;
}

function drawChar(ctx, img, size, p, bodyMap) {
  var bp = getParts(img, size, bodyMap);
  var bx=(p.bx||0), by=(p.by||0), al=p.alpha!==undefined?p.alpha:1;
  var order=["rightLeg","rightArm","torso","head","leftArm","leftLeg"];
  order.forEach(function(name) {
    var part=bp[name]; var pr=p[name]||{};
    var tox=bx+(pr.ox||0), toy=by+(pr.oy||0);
    if(name==="head"){var tr=p.torso||{}; tox+=(tr.ox||0)*0.4; toy+=(tr.oy||0)*0.4;}
    drawPart(ctx,img,part.r,part.px+bx,part.py+by,pr.rot||0,tox,toy,al);
  });
}

function drawDust(ctx,x,y,n,s,a,sz){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#aaa';for(var i=0;i<n;i++){var an=(i/n)*Math.PI*2,d=s*(0.3+Math.random()*0.7);ctx.beginPath();ctx.arc(x+Math.cos(an)*d,y-Math.random()*s*0.3,sz*(0.5+Math.random()),0,Math.PI*2);ctx.fill();}ctx.restore();}
function drawShadow(ctx,size){ctx.save();ctx.beginPath();ctx.ellipse(size/2,size*0.88,size*0.28,size*0.04,0,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.22)";ctx.fill();ctx.restore();}
function drawSpark(ctx,x,y,r,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#fff';ctx.lineWidth=2;for(var i=0;i<6;i++){var an=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(x+Math.cos(an)*r*0.25,y+Math.sin(an)*r*0.25);ctx.lineTo(x+Math.cos(an)*r,y+Math.sin(an)*r);ctx.stroke();}ctx.restore();}

}

function drawDust(ctx,x,y,n,s,a,sz){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#aaa';for(var i=0;i<n;i++){var an=(i/n)*Math.PI*2,d=s*(0.3+Math.random()*0.7);ctx.beginPath();ctx.arc(x+Math.cos(an)*d,y-Math.random()*s*0.3,sz*(0.5+Math.random()),0,Math.PI*2);ctx.fill();}ctx.restore();}
function drawShadow(ctx,size){ctx.save();ctx.beginPath();ctx.ellipse(size/2,size*0.88,size*0.28,size*0.04,0,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.22)";ctx.fill();ctx.restore();}
function drawSpark(ctx,x,y,r,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#fff';ctx.lineWidth=2;for(var i=0;i<6;i++){var an=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(x+Math.cos(an)*r*0.25,y+Math.sin(an)*r*0.25);ctx.lineTo(x+Math.cos(an)*r,y+Math.sin(an)*r);ctx.stroke();}ctx.restore();}

var ANIMATIONS = {
  idle: { label:"Idle", desc:"Breathing & weight shift", generate: function(ctx,img,f,tot,sz,bm) {
    var t=(f/tot)*Math.PI*2;
    // Slow breathing cycle with subtle weight shift
    var breathe=Math.sin(t);
    var shift=Math.sin(t*0.5);
    drawChar(ctx,img,sz,{
      head:{rot:shift*0.02, oy:breathe*-1.5},
      torso:{rot:shift*0.015, oy:breathe*-1},
      leftArm:{rot:0.05+breathe*0.04+shift*0.03},
      rightArm:{rot:-0.05-breathe*0.04-shift*0.03},
      leftLeg:{rot:shift*0.03},
      rightLeg:{rot:-shift*0.03},
      by:breathe*-1
    },bm);
  }},
  run: { label:"Run", desc:"Full sprint cycle", generate: function(ctx,img,f,tot,sz,bm) {
    var t=(f/tot)*Math.PI*2;
    // Run has 4 key poses: contact, down, passing, up
    // Bounce: high during flight, low at contact
    var contactPhase=Math.cos(t*2); // double-bounce per stride
    var bounce=(-Math.abs(Math.sin(t))*0.04 + (contactPhase>0.5?-0.015:0))*sz;
    // Forward lean is constant in a run
    var forwardLean=0.08;
    // Leg swing: front/back with asymmetric timing (faster forward snap)
    var legPhase=Math.sin(t);
    var legForward=legPhase>0?Math.pow(legPhase,0.7):-(Math.pow(-legPhase,0.7));
    // Arms oppose legs, elbows bent so less amplitude than legs
    drawChar(ctx,img,sz,{
      head:{rot:forwardLean*0.3+Math.sin(t*2)*0.02, oy:bounce*0.4},
      torso:{rot:forwardLean+Math.sin(t)*0.06, oy:bounce*0.3},
      leftArm:{rot:-legForward*0.85+forwardLean*0.5},
      rightArm:{rot:legForward*0.85+forwardLean*0.5},
      leftLeg:{rot:legForward*0.8},
      rightLeg:{rot:-legForward*0.8},
      by:bounce
    },bm);
    // Dust on foot strike
    var strike=Math.abs(Math.sin(t));
    if(strike>0.92) drawDust(ctx,sz/2+Math.sin(t)*6,(sz+img.height)/2+bounce,5,sz*0.06,0.35,sz*0.01);
  }},
  walk: { label:"Walk", desc:"Natural walking gait", generate: function(ctx,img,f,tot,sz,bm) {
    var t=(f/tot)*Math.PI*2;
    // Walk: one foot always on ground. Bounce peaks at midstance (leg straight under body)
    var bounce=Math.sin(t*2+Math.PI/2)*sz*0.012;
    // Hip sway: lateral weight shift over planted foot
    var hipSway=Math.sin(t)*sz*0.008;
    // Legs: moderate swing, front foot reaches, back foot pushes
    var legSwing=Math.sin(t);
    // Counter-rotation: shoulders twist opposite to hips
    var twist=Math.sin(t)*0.04;
    drawChar(ctx,img,sz,{
      head:{rot:-twist*0.3, ox:-hipSway*0.3},
      torso:{rot:twist, ox:hipSway},
      leftArm:{rot:-legSwing*0.35-0.05},
      rightArm:{rot:legSwing*0.35+0.05},
      leftLeg:{rot:legSwing*0.45},
      rightLeg:{rot:-legSwing*0.45},
      by:bounce
    },bm);
  }},
  jump: { label:"Jump", desc:"Squat, launch, peak, land", generate: function(ctx,img,f,tot,sz,bm) {
    var t=f/Math.max(tot-1,1);
    // Smooth parabolic arc
    var arc=-Math.sin(t*Math.PI)*sz*0.24;
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{},by:arc};
    if(t<0.18) {
      // Anticipation: deep squat, arms swing back, lean forward
      var q=t/0.18;
      var ease=q*q; // accelerating into squat
      p.torso={rot:ease*0.08, oy:ease*sz*0.03};
      p.leftLeg={rot:ease*0.35};
      p.rightLeg={rot:-ease*0.35};
      p.leftArm={rot:ease*0.5}; // arms back
      p.rightArm={rot:-ease*0.5};
      p.head={rot:-ease*0.04};
    } else if(t<0.35) {
      // Launch: explosive extension, arms drive up
      var q=(t-0.18)/0.17;
      var ease=1-Math.pow(1-q,2); // decelerating extension
      p.torso={rot:0.08*(1-ease)-ease*0.05, oy:0.03*sz*(1-ease)};
      p.leftLeg={rot:0.35*(1-ease)-ease*0.2};
      p.rightLeg={rot:-0.35*(1-ease)+ease*0.2};
      p.leftArm={rot:0.5-ease*1.3}; // arms drive up
      p.rightArm={rot:-0.5+ease*1.3};
      p.head={rot:-0.04+ease*0.06};
    } else if(t<0.65) {
      // Air: arms up, legs tuck
      var q=((t-0.35)/0.3);
      var tuck=Math.sin(q*Math.PI);
      p.leftArm={rot:-0.8-tuck*0.2};
      p.rightArm={rot:0.8+tuck*0.2};
      p.leftLeg={rot:tuck*0.5};
      p.rightLeg={rot:tuck*0.5};
      p.torso={rot:-0.05};
      p.head={rot:0.02};
    } else if(t<0.82) {
      // Descend: extend legs, arms come down
      var q=(t-0.65)/0.17;
      p.leftLeg={rot:-q*0.2};
      p.rightLeg={rot:q*0.2};
      p.leftArm={rot:-0.8+q*0.5};
      p.rightArm={rot:0.8-q*0.5};
      p.head={rot:q*0.04};
    } else {
      // Land: absorb with deep squat
      var q=(t-0.82)/0.18;
      var impact=Math.sin(q*Math.PI*0.5);
      p.torso={rot:impact*0.1, oy:impact*sz*0.03};
      p.leftLeg={rot:impact*0.4};
      p.rightLeg={rot:-impact*0.4};
      p.leftArm={rot:impact*0.3};
      p.rightArm={rot:-impact*0.3};
      p.head={rot:-impact*0.05};
    }
    drawChar(ctx,img,sz,p,bm);
    if(t>0.85){var q=(t-0.85)/0.15; drawDust(ctx,sz/2,(sz+img.height)/2+arc,4+Math.floor(q*6),sz*0.1*q,0.35*q,sz*0.012);}
  }},
  attack: { label:"Attack", desc:"Slash with full body", generate: function(ctx,img,f,tot,sz,bm) {
    var t=f/Math.max(tot-1,1);
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{}};
    if(t<0.3) {
      // Wind-up: coil back, shift weight to back foot
      var q=t/0.3;
      var ease=1-Math.pow(1-q,2);
      p.torso={rot:-ease*0.18, ox:-ease*sz*0.02};
      p.rightArm={rot:-ease*1.5}; // arm cocked way back
      p.leftArm={rot:ease*0.4}; // guard arm forward
      p.rightLeg={rot:-ease*0.2}; // weight back
      p.leftLeg={rot:ease*0.15};
      p.head={rot:-ease*0.08};
    } else if(t<0.45) {
      // Strike: explosive forward rotation
      var q=(t-0.3)/0.15;
      var ease=q*q*q; // sharp acceleration
      p.torso={rot:-0.18+ease*0.42, ox:-0.02*sz+ease*sz*0.06};
      p.rightArm={rot:-1.5+ease*3.0}; // huge swing
      p.leftArm={rot:0.4-ease*0.6};
      p.rightLeg={rot:-0.2+ease*0.35};
      p.leftLeg={rot:0.15-ease*0.1};
      p.head={rot:-0.08+ease*0.18};
    } else if(t<0.55) {
      // Follow-through: overextend
      var q=(t-0.45)/0.1;
      p.torso={rot:0.24+q*0.04, ox:sz*0.04};
      p.rightArm={rot:1.5+q*0.2}; // past peak
      p.leftArm={rot:-0.2-q*0.1};
      p.rightLeg={rot:0.15};
      p.leftLeg={rot:0.05};
      p.head={rot:0.1+q*0.02};
      // Impact shake
      var sh=Math.sin(q*Math.PI*6)*0.02;
      p.torso.rot+=sh; p.head.rot+=sh;
    } else {
      // Recovery: settle back
      var q=(t-0.55)/0.45;
      var ease=1-Math.pow(1-q,3);
      p.torso={rot:0.28*(1-ease)};
      p.rightArm={rot:1.7*(1-ease)};
      p.leftArm={rot:-0.3*(1-ease)};
      p.rightLeg={rot:0.15*(1-ease)};
      p.leftLeg={rot:0.05*(1-ease)};
      p.head={rot:0.12*(1-ease)};
    }
    drawChar(ctx,img,sz,p,bm);
    if(t>0.42&&t<0.6){var q=1-Math.abs(t-0.48)/0.12; if(q>0) drawSpark(ctx,(sz+img.width)/2+sz*0.06,(sz-img.height)/2+img.height*0.28,sz*0.12*q,0.9*q);}
  }},
  death: { label:"Death", desc:"Collapse to ground", generate: function(ctx,img,f,tot,sz,bm) {
    var t=f/Math.max(tot-1,1);
    // Phase 1: initial hit reaction (0-0.15)
    // Phase 2: knees buckle (0.15-0.4)
    // Phase 3: upper body follows, fall sideways (0.4-0.8)
    // Phase 4: settle on ground (0.8-1)
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{},by:0,alpha:1};
    if(t<0.15) {
      var q=t/0.15;
      p.head={rot:-q*0.1};
      p.torso={rot:-q*0.06};
      p.leftArm={rot:q*0.3};
      p.rightArm={rot:-q*0.4};
    } else if(t<0.4) {
