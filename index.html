<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprite Sheet Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#09090b;margin:0">
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;

// ============================================================
// BODYPIX - Per-pixel body part segmentation (24 parts)
// Groups into 6 animation parts: head, torso, lArm, rArm, lLeg, rLeg
// ============================================================
var _bpModel = null;
var _bpLoading = false;
var _bpCallbacks = [];

function getBodyPixModel() {
  return new Promise(function(resolve, reject) {
    if (_bpModel) { resolve(_bpModel); return; }
    _bpCallbacks.push({resolve:resolve, reject:reject});
    if (_bpLoading) return;
    _bpLoading = true;
    bodyPix.load({
      architecture: 'ResNet50',
      outputStride: 16,
      quantBytes: 2
    }).then(function(model) {
      _bpModel = model;
      _bpCallbacks.forEach(function(cb){cb.resolve(model);});
      _bpCallbacks = [];
    }).catch(function(e) {
      console.error("BodyPix load failed:", e);
      _bpCallbacks.forEach(function(cb){cb.reject(e);});
      _bpCallbacks = [];
      _bpLoading = false;
    });
  });
}

// BodyPix 24 part IDs -> our 6 groups
// 0,1: left/right face -> HEAD
// 2,3,6,7,10: left upper/lower arm front/back, left hand -> LEFT ARM
// 4,5,8,9,11: right upper/lower arm front/back, right hand -> RIGHT ARM
// 12,13: torso front/back -> TORSO
// 14,15,18,19,22: left upper/lower leg front/back, left foot -> LEFT LEG
// 16,17,20,21,23: right upper/lower leg front/back, right foot -> RIGHT LEG
var PART_GROUP = new Int8Array(24);
PART_GROUP[0]=0;PART_GROUP[1]=0; // head
PART_GROUP[12]=1;PART_GROUP[13]=1; // torso
PART_GROUP[2]=2;PART_GROUP[3]=2; // leftUpperArm
PART_GROUP[6]=3;PART_GROUP[7]=3;PART_GROUP[10]=3; // leftLowerArm
PART_GROUP[4]=4;PART_GROUP[5]=4; // rightUpperArm
PART_GROUP[8]=5;PART_GROUP[9]=5;PART_GROUP[11]=5; // rightLowerArm
PART_GROUP[14]=6;PART_GROUP[15]=6; // leftUpperLeg
PART_GROUP[18]=7;PART_GROUP[19]=7;PART_GROUP[22]=7; // leftLowerLeg
PART_GROUP[16]=8;PART_GROUP[17]=8; // rightUpperLeg
PART_GROUP[20]=9;PART_GROUP[21]=9;PART_GROUP[23]=9; // rightLowerLeg


// ============================================================
// EXTRACT BODY PARTS using BodyPix per-pixel segmentation
// ============================================================
// EXTRACT BODY PARTS using BodyPix per-pixel segmentation
// 10 parts: head, torso, L/R upper/lower arm, L/R upper/lower leg
// ============================================================
async function extractBodyParts(img) {
  var model = await getBodyPixModel();
  var cv = document.createElement("canvas");
  cv.width = img.width; cv.height = img.height;
  var ctx = cv.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var imgData = ctx.getImageData(0, 0, cv.width, cv.height);
  var d = imgData.data;
  var w = cv.width, h = cv.height;

  var result = await model.segmentPersonParts(cv, {
    flipHorizontal: false, internalResolution: 'high', segmentationThreshold: 0.55
  });
  var partData = result.data;
  var aiUsed = false;

  var detected = 0;
  for (var i = 0; i < partData.length; i++) { if (partData[i] >= 0) detected++; }
  var totalOpaque = 0;
  for (var j = 0; j < w*h; j++) { if (d[j*4+3] > 30) totalOpaque++; }
  var coverage = totalOpaque > 0 ? detected / totalOpaque : 0;

  var groupMap = new Int8Array(w * h).fill(-1);

  if (coverage > 0.15) {
    aiUsed = true;
    for (var k = 0; k < partData.length; k++) {
      if (partData[k] >= 0 && d[k*4+3] > 30) {
        groupMap[k] = PART_GROUP[partData[k]];
      }
    }
    var changed = true, passes = 0;
    while (changed && passes < 20) {
      changed = false; passes++;
      for (var fy = 0; fy < h; fy++) {
        for (var fx = 0; fx < w; fx++) {
          var fi = fy * w + fx;
          if (d[fi*4+3] <= 30 || groupMap[fi] >= 0) continue;
          var best = -1, bestDist = 999;
          for (var dy2 = -1; dy2 <= 1; dy2++) {
            for (var dx2 = -1; dx2 <= 1; dx2++) {
              if (dx2 === 0 && dy2 === 0) continue;
              var ny = fy+dy2, nx = fx+dx2;
              if (ny >= 0 && ny < h && nx >= 0 && nx < w) {
                var ni = ny*w+nx;
                if (groupMap[ni] >= 0) {
                  var dd = Math.abs(dx2)+Math.abs(dy2);
                  if (dd < bestDist) { bestDist = dd; best = groupMap[ni]; }
                }
              }
            }
          }
          if (best >= 0) { groupMap[fi] = best; changed = true; }
        }
      }
    }
  } else {
    var rows = [];
    for (var ry=0;ry<h;ry++){var left=-1,right=-1;for(var rx=0;rx<w;rx++){if(d[(ry*w+rx)*4+3]>30){if(left<0)left=rx;right=rx;}}rows.push({left:left,right:right,width:left>=0?right-left+1:0,cx:left>=0?(left+right)/2:w/2});}
    var topY2=0,botY2=h-1;
    for(var a1=0;a1<h;a1++){if(rows[a1].width>0){topY2=a1;break;}}
    for(var a2=h-1;a2>=0;a2--){if(rows[a2].width>0){botY2=a2;break;}}
    var charH=botY2-topY2+1;
    var neckY2=topY2+Math.floor(charH*0.28);
    var crotchY2=topY2+Math.floor(charH*0.55);
    var elbowY2=topY2+Math.floor(charH*0.42);
    var kneeY2=topY2+Math.floor(charH*0.72);
    for(var sy=0;sy<h;sy++){
      for(var sx=0;sx<w;sx++){
        var si2=sy*w+sx;
        if(d[si2*4+3]<=30) continue;
        if(sy<=neckY2) groupMap[si2]=0;
        else if(sy>=crotchY2){
          if(sy<kneeY2) groupMap[si2]=sx<rows[sy].cx?6:8;
          else groupMap[si2]=sx<rows[sy].cx?7:9;
        } else{
          var rowW=rows[sy].width, coreHalf=rowW*0.3, mid=rows[sy].cx;
          if(Math.abs(sx-mid)<coreHalf) groupMap[si2]=1;
          else if(sx<mid) groupMap[si2]=sy<elbowY2?2:3;
          else groupMap[si2]=sy<elbowY2?4:5;
        }
      }
    }
  }

  var NUM_PARTS = 10;
  var partNames = ["head","torso","leftUpperArm","leftLowerArm","rightUpperArm","rightLowerArm","leftUpperLeg","leftLowerLeg","rightUpperLeg","rightLowerLeg"];
  var bounds = [];
  for (var g=0;g<NUM_PARTS;g++) bounds.push({minX:w,minY:h,maxX:0,maxY:0,sumX:0,sumY:0,cnt:0});
  for (var by2=0;by2<h;by2++){
    for(var bx2=0;bx2<w;bx2++){
      var bi=by2*w+bx2, bg=groupMap[bi];
      if(bg<0) continue;
      var b=bounds[bg];
      if(bx2<b.minX)b.minX=bx2; if(bx2>b.maxX)b.maxX=bx2;
      if(by2<b.minY)b.minY=by2; if(by2>b.maxY)b.maxY=by2;
      b.sumX+=bx2; b.sumY+=by2; b.cnt++;
    }
  }

  var B=bounds;
  var headB=B[0],torsoB=B[1];
  var luaB=B[2],llaB=B[3],ruaB=B[4],rlaB=B[5];
  var lulB=B[6],lllB=B[7],rulB=B[8],rllB=B[9];

  var neckPivotY=headB.cnt>0?headB.maxY:Math.floor(h*0.28);
  var neckPivotX=headB.cnt>0?headB.sumX/headB.cnt:w/2;

  var lShX=luaB.cnt>0?luaB.maxX:w*0.3, lShY=luaB.cnt>0?luaB.minY:neckPivotY;
  var rShX=ruaB.cnt>0?ruaB.minX:w*0.7, rShY=ruaB.cnt>0?ruaB.minY:neckPivotY;

  var lElbX=luaB.cnt>0?luaB.sumX/luaB.cnt:w*0.25;
  var lElbY=luaB.cnt>0?luaB.maxY:(llaB.cnt>0?llaB.minY:h*0.42);
  var rElbX=ruaB.cnt>0?ruaB.sumX/ruaB.cnt:w*0.75;
  var rElbY=ruaB.cnt>0?ruaB.maxY:(rlaB.cnt>0?rlaB.minY:h*0.42);

  var lHipX=lulB.cnt>0?lulB.sumX/lulB.cnt:w*0.4;
  var lHipY=lulB.cnt>0?lulB.minY:h*0.55;
  var rHipX=rulB.cnt>0?rulB.sumX/rulB.cnt:w*0.6;
  var rHipY=rulB.cnt>0?rulB.minY:h*0.55;

  var lKneeX=lulB.cnt>0?lulB.sumX/lulB.cnt:w*0.4;
  var lKneeY=lulB.cnt>0?lulB.maxY:(lllB.cnt>0?lllB.minY:h*0.72);
  var rKneeX=rulB.cnt>0?rulB.sumX/rulB.cnt:w*0.6;
  var rKneeY=rulB.cnt>0?rulB.maxY:(rllB.cnt>0?rllB.minY:h*0.72);

  var pivots = {
    head:{x:neckPivotX,y:neckPivotY}, torso:{x:neckPivotX,y:(neckPivotY+Math.max(lHipY,rHipY))/2},
    leftUpperArm:{x:lShX,y:lShY}, leftLowerArm:{x:lElbX,y:lElbY},
    rightUpperArm:{x:rShX,y:rShY}, rightLowerArm:{x:rElbX,y:rElbY},
    leftUpperLeg:{x:lHipX,y:lHipY}, leftLowerLeg:{x:lKneeX,y:lKneeY},
    rightUpperLeg:{x:rHipX,y:rHipY}, rightLowerLeg:{x:rKneeX,y:rKneeY}
  };
  var chainEnds = {
    leftUpperArm:{x:lElbX,y:lElbY}, rightUpperArm:{x:rElbX,y:rElbY},
    leftUpperLeg:{x:lKneeX,y:lKneeY}, rightUpperLeg:{x:rKneeX,y:rKneeY}
  };

  // Body infill: dilated torso to fill gaps behind moving limbs
  var infillCv = document.createElement("canvas");
  infillCv.width = w; infillCv.height = h;
  var infillCtx = infillCv.getContext("2d");
  var infillImg = infillCtx.createImageData(w, h);
  var infD = infillImg.data;
  var dilateR = Math.max(4, Math.floor(Math.max(w,h)*0.04));
  var torsoMask = new Uint8Array(w*h);
  for(var ti=0;ti<w*h;ti++){if(groupMap[ti]===1) torsoMask[ti]=1;}
  var dilated = new Uint8Array(torsoMask);
  for(var dp=0;dp<dilateR;dp++){
    var next=new Uint8Array(dilated);
    for(var dy3=0;dy3<h;dy3++){for(var dx3=0;dx3<w;dx3++){
      if(dilated[dy3*w+dx3]) continue;
      if(d[(dy3*w+dx3)*4+3]<=30) continue;
      for(var nn=-1;nn<=1;nn++){for(var mm=-1;mm<=1;mm++){
        var ny3=dy3+nn,nx3=dx3+mm;
        if(ny3>=0&&ny3<h&&nx3>=0&&nx3<w&&dilated[ny3*w+nx3]){next[dy3*w+dx3]=1;nn=2;break;}
      }}
    }}
    dilated=next;
  }
  for(var iy=0;iy<h;iy++){for(var ix=0;ix<w;ix++){
    var ii=iy*w+ix;
    if(!dilated[ii]||torsoMask[ii]) continue;
    var bestC=-1,bestD2=99999;
    var sr=dilateR+2;
    for(var sy2=Math.max(0,iy-sr);sy2<Math.min(h,iy+sr);sy2++){
      for(var sx2=Math.max(0,ix-sr);sx2<Math.min(w,ix+sr);sx2++){
        if(torsoMask[sy2*w+sx2]){
          var dd2=(iy-sy2)*(iy-sy2)+(ix-sx2)*(ix-sx2);
          if(dd2<bestD2){bestD2=dd2;bestC=(sy2*w+sx2)*4;}
        }
      }
    }
    if(bestC>=0){infD[ii*4]=d[bestC];infD[ii*4+1]=d[bestC+1];infD[ii*4+2]=d[bestC+2];infD[ii*4+3]=d[bestC+3];}
  }}
  infillCtx.putImageData(infillImg,0,0);
  var infillImgEl=new Image();infillImgEl.src=infillCv.toDataURL();infillImgEl.width=w;infillImgEl.height=h;

  var overlapPx = Math.max(3, Math.floor(Math.max(w,h) * 0.04));
  var parts = {};
  for (var pi=0; pi<NUM_PARTS; pi++) {
    var pc = document.createElement("canvas");
    pc.width = w; pc.height = h;
    var pctx = pc.getContext("2d");
    var pimg = pctx.createImageData(w, h);
    var pd2 = pimg.data;
    for (var py2=0; py2<h; py2++) {
      for (var px2=0; px2<w; px2++) {
        var pidx = py2*w+px2;
        if (d[pidx*4+3] <= 10) continue;
        var si3 = pidx*4;
        if (groupMap[pidx] === pi) {
          pd2[si3]=d[si3];pd2[si3+1]=d[si3+1];pd2[si3+2]=d[si3+2];pd2[si3+3]=d[si3+3];
        } else {
          var nearOwn = false;
          for (var ody=-overlapPx; ody<=overlapPx && !nearOwn; ody+=2) {
            for (var odx=-overlapPx; odx<=overlapPx && !nearOwn; odx+=2) {
              var ony=py2+ody, onx=px2+odx;
              if(ony>=0&&ony<h&&onx>=0&&onx<w && groupMap[ony*w+onx]===pi) nearOwn=true;
            }
          }
          if (nearOwn) {
            pd2[si3]=d[si3];pd2[si3+1]=d[si3+1];pd2[si3+2]=d[si3+2];pd2[si3+3]=Math.round(d[si3+3]*0.4);
          }
        }
      }
    }
    pctx.putImageData(pimg, 0, 0);
    var partImg = new Image();
    partImg.src = pc.toDataURL();
    partImg.width = w; partImg.height = h;
    parts[partNames[pi]] = {img:partImg, pivot:pivots[partNames[pi]], chainEnd:chainEnds[partNames[pi]]||null};
  }

  return {
    parts: parts, infill: infillImgEl, width: w, height: h, aiUsed: aiUsed, coverage: coverage,
    landmarks: {
      topY: (headB.cnt>0?headB.minY:0)/h,
      neckY: neckPivotY/h,
      shoulderY: Math.min(lShY,rShY)/h,
      elbowY: Math.max(lElbY,rElbY)/h,
      hipY: Math.max(lHipY,rHipY)/h,
      kneeY: Math.max(lKneeY,rKneeY)/h,
      botY: (Math.max(lllB.cnt>0?lllB.maxY:0,rllB.cnt>0?rllB.maxY:0)||h)/h
    }
  };
}


// ============================================================
// CLAUDE VISION API - analyzes character anatomy
// Returns per-pixel body part assignment using Claude's understanding
// ============================================================
// DRAWING ENGINE - renders extracted body part canvases
// ============================================================
function drawPartImg(ctx, partData, imgW, imgH, size, rot, ox, oy, alpha) {
  var img = partData.img;
  var px = partData.pivot.x;
  var py = partData.pivot.y;
  var drawOx = (size - imgW) / 2;
  var drawOy = (size - imgH) / 2;
  var pivotX = drawOx + px + (ox||0);
  var pivotY = drawOy + py + (oy||0);
  ctx.save();
  if (alpha !== undefined && alpha < 1) ctx.globalAlpha = alpha;
  ctx.translate(pivotX, pivotY);
  ctx.rotate(rot || 0);
  ctx.translate(-pivotX, -pivotY);
  ctx.drawImage(img, 0, 0, imgW, imgH, drawOx+(ox||0), drawOy+(oy||0), imgW, imgH);
  ctx.restore();
}

function chainOffset(part, rot) {
  if(!part||!part.chainEnd) return {x:0,y:0};
  var dx=part.chainEnd.x-part.pivot.x, dy=part.chainEnd.y-part.pivot.y;
  var cs=Math.cos(rot), sn=Math.sin(rot);
  return {x:dx*cs-dy*sn-dx, y:dx*sn+dy*cs-dy};
}
function drawAnimChar(ctx, bd, size, pose) {
  if (!bd || !bd.parts) return;
  var iw = bd.width, ih = bd.height;
  var bx=pose.bx||0, by=pose.by||0;
  var al = pose.alpha!==undefined ? pose.alpha : 1;
  if(bd.infill&&bd.infill.complete){ctx.save();if(al<1) ctx.globalAlpha=al;var iox=(size-iw)/2,ioy=(size-ih)/2;ctx.drawImage(bd.infill,0,0,iw,ih,iox+bx,ioy+by,iw,ih);ctx.restore();}
  function gP(n){return pose[n]||{};}
  function uP(u,o){var a=pose[u];if(a)return a;var b=pose[o];if(b)return{rot:(b.rot||0)*0.6,ox:b.ox,oy:b.oy};return{};}
  function lP(l,o){var a=pose[l];if(a)return a;var b=pose[o];if(b)return{rot:(b.rot||0)*0.5};return{};}
  function dp(n,r,x,y){var p=bd.parts[n];if(p&&p.img)drawPartImg(ctx,p,iw,ih,size,r,x,y,al);}
  var tP=gP("torso"),hP=gP("head");
  var ruL=uP("rightUpperLeg","rightLeg"),rlL=lP("rightLowerLeg","rightLeg");
  dp("rightUpperLeg",ruL.rot||0,bx,by);var rkO=chainOffset(bd.parts.rightUpperLeg,ruL.rot||0);
  dp("rightLowerLeg",(ruL.rot||0)+(rlL.rot||0),bx+rkO.x,by+rkO.y);
  var ruA=uP("rightUpperArm","rightArm"),rlA=lP("rightLowerArm","rightArm");
  dp("rightUpperArm",ruA.rot||0,bx,by);var reO=chainOffset(bd.parts.rightUpperArm,ruA.rot||0);
  dp("rightLowerArm",(ruA.rot||0)+(rlA.rot||0),bx+reO.x,by+reO.y);
  dp("torso",tP.rot||0,bx+(tP.ox||0),by+(tP.oy||0));
  dp("head",hP.rot||0,bx+(hP.ox||0)+(tP.ox||0)*0.4,by+(hP.oy||0)+(tP.oy||0)*0.4);
  var luA=uP("leftUpperArm","leftArm"),llA=lP("leftLowerArm","leftArm");
  dp("leftUpperArm",luA.rot||0,bx,by);var leO=chainOffset(bd.parts.leftUpperArm,luA.rot||0);
  dp("leftLowerArm",(luA.rot||0)+(llA.rot||0),bx+leO.x,by+leO.y);
  var luL=uP("leftUpperLeg","leftLeg"),llL=lP("leftLowerLeg","leftLeg");
  dp("leftUpperLeg",luL.rot||0,bx,by);var lkO=chainOffset(bd.parts.leftUpperLeg,luL.rot||0);
  dp("leftLowerLeg",(luL.rot||0)+(llL.rot||0),bx+lkO.x,by+lkO.y);
}

function drawCharFallback(ctx, img, size, pose) {
  var iw=img.width,ih=img.height,ox=(size-iw)/2,oy=(size-ih)/2;
  ctx.save();
  if(pose.alpha!==undefined) ctx.globalAlpha=pose.alpha;
  ctx.drawImage(img,0,0,iw,ih,ox+(pose.bx||0),oy+(pose.by||0),iw,ih);
  ctx.restore();
}

function drawDust(ctx,x,y,n,s,a,sz){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#aaa';for(var i=0;i<n;i++){var an=(i/n)*Math.PI*2,d2=s*(0.3+Math.random()*0.7);ctx.beginPath();ctx.arc(x+Math.cos(an)*d2,y-Math.random()*s*0.3,sz*(0.5+Math.random()),0,Math.PI*2);ctx.fill();}ctx.restore();}
function drawShadow(ctx,size){ctx.save();ctx.beginPath();ctx.ellipse(size/2,size*0.88,size*0.28,size*0.04,0,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.22)";ctx.fill();ctx.restore();}
function drawSpark(ctx,x,y,r,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#fff';ctx.lineWidth=2;for(var i=0;i<6;i++){var an=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(x+Math.cos(an)*r*0.25,y+Math.sin(an)*r*0.25);ctx.lineTo(x+Math.cos(an)*r,y+Math.sin(an)*r);ctx.stroke();}ctx.restore();}


function detectWeaponType(img) {
  var w=img.width, h=img.height, ar=w/Math.max(h,1);
  if(ar>2.2) return "gun";
  if(ar<0.5) return "melee";
  try {
    var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
    var cx=cv.getContext("2d"); cx.drawImage(img,0,0);
    var d=cx.getImageData(0,0,w,h).data;
    var topW=0,botW=0,topC=0,botC=0;
    for(var y=0;y<h;y++){for(var x=0;x<w;x++){
      if(d[(y*w+x)*4+3]>128){if(y<h*0.4){topW++;} else if(y>h*0.6){botW++;}}
    }}
    if(topW>botW*1.5) return "gun";
    if(botW>topW*1.5) return "melee";
  } catch(e){}
  return ar>1.2?"gun":"melee";
}

function drawWeapon(ctx, wpn, bd, size, pose, position) {
  if(!wpn||!wpn.img) return;
  var wi=wpn.img, ar=wi.width/Math.max(wi.height,1);
  var pct=(wpn.size||30)/100;
  var ws=size*pct, ww=ws*ar, wh=ws;
  var tP=pose.torso||{}, by=pose.by||0;
  if(position==="back"){
    var lm=bd?bd.landmarks:null;
    var shY=lm?lm.shoulderY*size:size*0.25;
    var hipY=lm?lm.hipY*size:size*0.52;
    var backCx=size*0.42+(tP.ox||0)*0.3;
    var backCy=(shY+hipY)*0.5+by+(tP.oy||0)*0.3;
    var bRot=(tP.rot||0)*0.3;
    ctx.save();
    ctx.translate(backCx, backCy);
    ctx.rotate(bRot);
    ctx.globalAlpha=0.75;
    if(wpn.type==="gun"){
      ctx.rotate(-Math.PI/2+0.1);
      ctx.drawImage(wi,-ww*0.5,-wh*0.4,ww*0.7,wh*0.7);
    } else {
      ctx.rotate(Math.PI/2-0.1);
      ctx.drawImage(wi,-ww*0.5,-wh*0.3,ww*0.7,wh*0.7);
    }
    ctx.restore();
  } else {

function removeBackground(img, tolerance) {
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var id = ctx.getImageData(0, 0, c.width, c.height);
  var d = id.data;
  var w = c.width, h = c.height;
  var tol = tolerance || 30;
  var visited = new Uint8Array(w * h);

  // Get background color samples from corners
  function getPixel(x, y) { var i = (y * w + x) * 4; return [d[i], d[i+1], d[i+2], d[i+3]]; }
  function colorDist(a, b) { return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) + Math.abs(a[2]-b[2]); }

  // Sample multiple corner pixels to get reliable bg color
  var samples = [];
  var margin = Math.max(1, Math.floor(Math.min(w, h) * 0.02));
  for (var sy = 0; sy < margin; sy++) {
    for (var sx = 0; sx < margin; sx++) {
      samples.push(getPixel(sx, sy));
      samples.push(getPixel(w - 1 - sx, sy));
      samples.push(getPixel(sx, h - 1 - sy));
      samples.push(getPixel(w - 1 - sx, h - 1 - sy));
    }
  }
  // Average bg color
  var bg = [0,0,0];
  samples.forEach(function(s) { bg[0] += s[0]; bg[1] += s[1]; bg[2] += s[2]; });
  bg[0] = Math.round(bg[0] / samples.length);
  bg[1] = Math.round(bg[1] / samples.length);
  bg[2] = Math.round(bg[2] / samples.length);

  // Flood fill from edges
  var queue = [];
  for (var x = 0; x < w; x++) { queue.push(x); queue.push(0); queue.push(x); queue.push(h-1); }
  for (var y = 1; y < h-1; y++) { queue.push(0); queue.push(y); queue.push(w-1); queue.push(y); }

  while (queue.length > 0) {
    var qy = queue.pop(), qx = queue.pop();
    if (qx < 0 || qx >= w || qy < 0 || qy >= h) continue;
    var qi = qy * w + qx;
    if (visited[qi]) continue;
    var px = getPixel(qx, qy);
    if (colorDist(px, bg) > tol) continue;
    visited[qi] = 1;
    d[qi * 4 + 3] = 0;
    queue.push(qx-1); queue.push(qy);
    queue.push(qx+1); queue.push(qy);
    queue.push(qx); queue.push(qy-1);
    queue.push(qx); queue.push(qy+1);
  }

  ctx.putImageData(id, 0, 0);
  var result = new Image();
  result.src = c.toDataURL();
  result.width = w; result.height = h;
  return result;
}
