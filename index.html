<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sprite Sheet Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#09090b;margin:0">
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;

// ============================================================
// BODYPIX - Per-pixel body part segmentation (24 parts)
// Groups into 6 animation parts: head, torso, lArm, rArm, lLeg, rLeg
// ============================================================
var _bpModel = null;
var _bpLoading = false;
var _bpCallbacks = [];

function getBodyPixModel() {
  return new Promise(function(resolve, reject) {
    if (_bpModel) { resolve(_bpModel); return; }
    _bpCallbacks.push({resolve:resolve, reject:reject});
    if (_bpLoading) return;
    _bpLoading = true;
    bodyPix.load({
      architecture: 'ResNet50',
      outputStride: 16,
      quantBytes: 2
    }).then(function(model) {
      _bpModel = model;
      _bpCallbacks.forEach(function(cb){cb.resolve(model);});
      _bpCallbacks = [];
    }).catch(function(e) {
      console.error("BodyPix load failed:", e);
      _bpCallbacks.forEach(function(cb){cb.reject(e);});
      _bpCallbacks = [];
      _bpLoading = false;
    });
  });
}

// BodyPix 24 part IDs -> our 6 groups
// 0,1: left/right face -> HEAD
// 2,3,6,7,10: left upper/lower arm front/back, left hand -> LEFT ARM
// 4,5,8,9,11: right upper/lower arm front/back, right hand -> RIGHT ARM
// 12,13: torso front/back -> TORSO
// 14,15,18,19,22: left upper/lower leg front/back, left foot -> LEFT LEG
// 16,17,20,21,23: right upper/lower leg front/back, right foot -> RIGHT LEG
var PART_GROUP = new Int8Array(24);
PART_GROUP[0]=0;PART_GROUP[1]=0; // head
PART_GROUP[12]=1;PART_GROUP[13]=1; // torso
PART_GROUP[2]=2;PART_GROUP[3]=2;PART_GROUP[6]=2;PART_GROUP[7]=2;PART_GROUP[10]=2; // left arm
PART_GROUP[4]=3;PART_GROUP[5]=3;PART_GROUP[8]=3;PART_GROUP[9]=3;PART_GROUP[11]=3; // right arm
PART_GROUP[14]=4;PART_GROUP[15]=4;PART_GROUP[18]=4;PART_GROUP[19]=4;PART_GROUP[22]=4; // left leg
PART_GROUP[16]=5;PART_GROUP[17]=5;PART_GROUP[20]=5;PART_GROUP[21]=5;PART_GROUP[23]=5; // right leg


// ============================================================
// EXTRACT BODY PARTS using BodyPix per-pixel segmentation
// ============================================================
async function extractBodyParts(img) {
  var model = await getBodyPixModel();

  // BodyPix needs a canvas
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var imgData = ctx.getImageData(0, 0, c.width, c.height);
  var d = imgData.data;
  var w = c.width, h = c.height;

  // Run BodyPix segmentation - returns per-pixel part IDs
  var result = await model.segmentPersonParts(c, {
    flipHorizontal: false,
    internalResolution: 'high',
    segmentationThreshold: 0.55
  });

  var partData = result.data; // Int32Array, -1 = background, 0-23 = part ID
  var aiUsed = false;

  // Check how many pixels were detected
  var detected = 0;
  for (var i = 0; i < partData.length; i++) { if (partData[i] >= 0) detected++; }
  var totalOpaque = 0;
  for (var j = 0; j < w*h; j++) { if (d[j*4+3] > 30) totalOpaque++; }
  var coverage = totalOpaque > 0 ? detected / totalOpaque : 0;

  // Build per-group pixel assignment
  // groupMap[pixelIndex] = 0-5 group, or -1 if unassigned
  var groupMap = new Int8Array(w * h).fill(-1);

  if (coverage > 0.15) {
    aiUsed = true;
    for (var k = 0; k < partData.length; k++) {
      if (partData[k] >= 0 && d[k*4+3] > 30) {
        groupMap[k] = PART_GROUP[partData[k]];
      }
    }

    // Fill gaps: any opaque pixel not assigned by BodyPix gets assigned
    // to the nearest assigned pixel's group (flood-fill style)
    var changed = true;
    var passes = 0;
    while (changed && passes < 20) {
      changed = false;
      passes++;
      for (var fy = 0; fy < h; fy++) {
        for (var fx = 0; fx < w; fx++) {
          var fi = fy * w + fx;
          if (d[fi*4+3] <= 30 || groupMap[fi] >= 0) continue;
          // Check 4-neighbors
          var best = -1, bestDist = 999;
          for (var dy = -1; dy <= 1; dy++) {
            for (var dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              var ny = fy+dy, nx = fx+dx;
              if (ny >= 0 && ny < h && nx >= 0 && nx < w) {
                var ni = ny*w+nx;
                if (groupMap[ni] >= 0) {
                  var dd = Math.abs(dx)+Math.abs(dy);
                  if (dd < bestDist) { bestDist = dd; best = groupMap[ni]; }
                }
              }
            }
          }
          if (best >= 0) { groupMap[fi] = best; changed = true; }
        }
      }
    }
  } else {
    // Fallback: silhouette heuristic
    var rows = [];
    for (var ry=0;ry<h;ry++){var left=-1,right=-1;for(var rx=0;rx<w;rx++){if(d[(ry*w+rx)*4+3]>30){if(left<0)left=rx;right=rx;}}rows.push({left:left,right:right,width:left>=0?right-left+1:0,cx:left>=0?(left+right)/2:w/2});}
    var topY=0,botY=h-1;
    for(var a1=0;a1<h;a1++){if(rows[a1].width>0){topY=a1;break;}}
    for(var a2=h-1;a2>=0;a2--){if(rows[a2].width>0){botY=a2;break;}}
    var charH=botY-topY+1;
    var neckY=topY+Math.floor(charH*0.28);
    var crotchY=topY+Math.floor(charH*0.55);
    for(var sy=0;sy<h;sy++){
      for(var sx=0;sx<w;sx++){
        var si=sy*w+sx;
        if(d[si*4+3]<=30) continue;
        if(sy<=neckY) groupMap[si]=0;
        else if(sy>=crotchY) groupMap[si]=sx<rows[sy].cx?4:5;
        else{
          var rowW=rows[sy].width;
          var coreHalf=rowW*0.3;
          var mid=rows[sy].cx;
          if(Math.abs(sx-mid)<coreHalf) groupMap[si]=1;
          else if(sx<mid) groupMap[si]=2;
          else groupMap[si]=3;
        }
      }
    }
  }

  // Compute bounding boxes and pivots per group
  var bounds = [];
  for (var g=0;g<6;g++) bounds.push({minX:w,minY:h,maxX:0,maxY:0,sumX:0,sumY:0,cnt:0});
  for (var by=0;by<h;by++){
    for(var bx=0;bx<w;bx++){
      var bi=by*w+bx;
      var bg=groupMap[bi];
      if(bg<0) continue;
      var b=bounds[bg];
      if(bx<b.minX)b.minX=bx; if(bx>b.maxX)b.maxX=bx;
      if(by<b.minY)b.minY=by; if(by>b.maxY)b.maxY=by;
      b.sumX+=bx; b.sumY+=by; b.cnt++;
    }
  }

  // Pivots: connection points between parts
  var headB=bounds[0], torsoB=bounds[1], lArmB=bounds[2], rArmB=bounds[3], lLegB=bounds[4], rLegB=bounds[5];
  var neckPivotY = headB.cnt>0 ? headB.maxY : Math.floor(h*0.28);
  var neckPivotX = headB.cnt>0 ? headB.sumX/headB.cnt : w/2;
  var lShoulderX = lArmB.cnt>0 ? lArmB.maxX : w*0.3;
  var lShoulderY = lArmB.cnt>0 ? lArmB.minY : neckPivotY;
  var rShoulderX = rArmB.cnt>0 ? rArmB.minX : w*0.7;
  var rShoulderY = rArmB.cnt>0 ? rArmB.minY : neckPivotY;
  var lHipX = lLegB.cnt>0 ? lLegB.sumX/lLegB.cnt : w*0.4;
  var lHipY = lLegB.cnt>0 ? lLegB.minY : h*0.55;
  var rHipX = rLegB.cnt>0 ? rLegB.sumX/rLegB.cnt : w*0.6;
  var rHipY = rLegB.cnt>0 ? rLegB.minY : h*0.55;

  var pivots = {
    head:     {x: neckPivotX, y: neckPivotY},
    torso:    {x: (neckPivotX), y: (neckPivotY + Math.max(lHipY,rHipY))/2},
    leftArm:  {x: lShoulderX, y: lShoulderY},
    rightArm: {x: rShoulderX, y: rShoulderY},
    leftLeg:  {x: lHipX, y: lHipY},
    rightLeg: {x: rHipX, y: rHipY}
  };

  // Extract each part as masked canvas with overlap blending
  var partNames = ["head","torso","leftArm","rightArm","leftLeg","rightLeg"];
  var overlapPx = Math.max(3, Math.floor(Math.max(w,h) * 0.04));
  var parts = {};

  for (var pi=0; pi<6; pi++) {
    var pc = document.createElement("canvas");
    pc.width = w; pc.height = h;
    var pctx = pc.getContext("2d");
    var pimg = pctx.createImageData(w, h);
    var pd = pimg.data;

    for (var py=0; py<h; py++) {
      for (var px=0; px<w; px++) {
        var pidx = py*w+px;
        if (d[pidx*4+3] <= 10) continue;
        var si2 = pidx*4;
        if (groupMap[pidx] === pi) {
          // Core pixel
          pd[si2]=d[si2]; pd[si2+1]=d[si2+1]; pd[si2+2]=d[si2+2]; pd[si2+3]=d[si2+3];
        } else {
          // Check overlap zone
          var nearOwn = false;
          for (var ody=-overlapPx; ody<=overlapPx && !nearOwn; ody+=2) {
            for (var odx=-overlapPx; odx<=overlapPx && !nearOwn; odx+=2) {
              var ony=py+ody, onx=px+odx;
              if(ony>=0&&ony<h&&onx>=0&&onx<w && groupMap[ony*w+onx]===pi) nearOwn=true;
            }
          }
          if (nearOwn) {
            pd[si2]=d[si2]; pd[si2+1]=d[si2+1]; pd[si2+2]=d[si2+2];
            pd[si2+3]=Math.round(d[si2+3]*0.4);
          }
        }
      }
    }
    pctx.putImageData(pimg, 0, 0);
    var partImg = new Image();
    partImg.src = pc.toDataURL();
    partImg.width = w; partImg.height = h;
    parts[partNames[pi]] = {img: partImg, pivot: pivots[partNames[pi]]};
  }

  return {
    parts: parts, width: w, height: h, aiUsed: aiUsed, coverage: coverage,
    landmarks: {
      topY: (headB.cnt>0?headB.minY:0)/h,
      neckY: neckPivotY/h,
      shoulderY: Math.min(lShoulderY,rShoulderY)/h,
      hipY: Math.max(lHipY,rHipY)/h,
      botY: (Math.max(lLegB.maxY,rLegB.maxY)||h)/h
    }
  };
}

// ============================================================
// CLAUDE VISION API - analyzes character anatomy
// Returns per-pixel body part assignment using Claude's understanding
// ============================================================
// DRAWING ENGINE - renders extracted body part canvases
// ============================================================
function drawPartImg(ctx, partData, imgW, imgH, size, rot, ox, oy, alpha) {
  var img = partData.img;
  var px = partData.pivot.x;
  var py = partData.pivot.y;
  var drawOx = (size - imgW) / 2;
  var drawOy = (size - imgH) / 2;
  var pivotX = drawOx + px + (ox||0);
  var pivotY = drawOy + py + (oy||0);
  ctx.save();
  if (alpha !== undefined && alpha < 1) ctx.globalAlpha = alpha;
  ctx.translate(pivotX, pivotY);
  ctx.rotate(rot || 0);
  ctx.translate(-pivotX, -pivotY);
  ctx.drawImage(img, 0, 0, imgW, imgH, drawOx+(ox||0), drawOy+(oy||0), imgW, imgH);
  ctx.restore();
}

function drawAnimChar(ctx, bd, size, pose) {
  if (!bd || !bd.parts) return;
  var iw = bd.width, ih = bd.height;
  var bx=pose.bx||0, by=pose.by||0;
  var al = pose.alpha!==undefined ? pose.alpha : 1;
  // Draw back-to-front: back leg, back arm, torso, head, front arm, front leg
  var order = ["rightLeg","rightArm","torso","head","leftArm","leftLeg"];
  order.forEach(function(name) {
    var part = bd.parts[name];
    if (!part||!part.img) return;
    var pr = pose[name] || {};
    var ox = bx+(pr.ox||0), oy = by+(pr.oy||0);
    if (name==="head"){var tr=pose.torso||{}; ox+=(tr.ox||0)*0.4; oy+=(tr.oy||0)*0.4;}
    drawPartImg(ctx, part, iw, ih, size, pr.rot||0, ox, oy, al);
  });
}

function drawCharFallback(ctx, img, size, pose) {
  var iw=img.width,ih=img.height,ox=(size-iw)/2,oy=(size-ih)/2;
  ctx.save();
  if(pose.alpha!==undefined) ctx.globalAlpha=pose.alpha;
  ctx.drawImage(img,0,0,iw,ih,ox+(pose.bx||0),oy+(pose.by||0),iw,ih);
  ctx.restore();
}

function drawDust(ctx,x,y,n,s,a,sz){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#aaa';for(var i=0;i<n;i++){var an=(i/n)*Math.PI*2,d2=s*(0.3+Math.random()*0.7);ctx.beginPath();ctx.arc(x+Math.cos(an)*d2,y-Math.random()*s*0.3,sz*(0.5+Math.random()),0,Math.PI*2);ctx.fill();}ctx.restore();}
function drawShadow(ctx,size){ctx.save();ctx.beginPath();ctx.ellipse(size/2,size*0.88,size*0.28,size*0.04,0,0,Math.PI*2);ctx.fillStyle="rgba(0,0,0,0.22)";ctx.fill();ctx.restore();}
function drawSpark(ctx,x,y,r,a){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle='#fff';ctx.lineWidth=2;for(var i=0;i<6;i++){var an=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(x+Math.cos(an)*r*0.25,y+Math.sin(an)*r*0.25);ctx.lineTo(x+Math.cos(an)*r,y+Math.sin(an)*r);ctx.stroke();}ctx.restore();}


function detectWeaponType(img) {
  var w=img.width, h=img.height, ar=w/Math.max(h,1);
  if(ar>2.2) return "gun";
  if(ar<0.5) return "melee";
  try {
    var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
    var cx=cv.getContext("2d"); cx.drawImage(img,0,0);
    var d=cx.getImageData(0,0,w,h).data;
    var topW=0,botW=0,topC=0,botC=0;
    for(var y=0;y<h;y++){for(var x=0;x<w;x++){
      if(d[(y*w+x)*4+3]>128){if(y<h*0.4){topW++;} else if(y>h*0.6){botW++;}}
    }}
    if(topW>botW*1.5) return "gun";
    if(botW>topW*1.5) return "melee";
  } catch(e){}
  return ar>1.2?"gun":"melee";
}

function drawWeapon(ctx, wpn, bd, size, pose, position) {
  if(!wpn||!wpn.img) return;
  var wi=wpn.img, ar=wi.width/Math.max(wi.height,1);
  var pct=(wpn.size||30)/100;
  var ws=size*pct, ww=ws*ar, wh=ws;
  var tP=pose.torso||{}, by=pose.by||0, bx=pose.bx||0;
  var userRot=(wpn.rot||0)*Math.PI/180;
  if(position==="back"){
    var lm=bd?bd.landmarks:null;
    var shY=lm?lm.shoulderY*size:size*0.25;
    var hipY=lm?lm.hipY*size:size*0.52;
    var bo=wpn.backOff||{x:0,y:0};
    var defBx=size*0.48+bx+(tP.ox||0)*0.3, defBy=(shY+hipY)*0.5+by+(tP.oy||0)*0.3;
    var backCx=(bo.x!==0||bo.y!==0)?((bo.x*0.5+0.5)*size):defBx;
    var backCy=(bo.x!==0||bo.y!==0)?((bo.y*0.5+0.5)*size):defBy;
    var bRot=(tP.rot||0)*0.5;
    ctx.save();
    ctx.translate(backCx, backCy);
    ctx.rotate(bRot);
    ctx.globalAlpha=0.75;
    if(wpn.type==="gun"){
      ctx.rotate(-Math.PI/2+0.1+userRot);
      ctx.drawImage(wi,-ww*0.35,-wh*0.35,ww*0.7,wh*0.7);
    } else {
      ctx.rotate(Math.PI/2-0.1+userRot);
      ctx.drawImage(wi,-ww*0.35,-wh*0.35,ww*0.7,wh*0.7);
    }
    ctx.restore();
  } else {
    var ao=wpn.atkOff||{x:0,y:0};
    var armP=pose.leftUpperArm||pose.leftArm||pose.rightArm||{};
    var foreP=pose.leftLowerArm||{};
    var aRot=armP.rot||0;
    var lm2=bd?bd.landmarks:null;
    var sY=lm2?lm2.shoulderY*size:size*0.28;
    var defX=size*0.42+bx+(tP.ox||0), defY=sY+size*0.22+by+(tP.oy||0);
    var handX=(ao.x!==0||ao.y!==0)?((ao.x*0.5+0.5)*size):defX;
    var handY=(ao.x!==0||ao.y!==0)?((ao.y*0.5+0.5)*size):defY;
    var totalRot=aRot+(foreP.rot||0);
    ctx.save();
    ctx.translate(handX,handY);
    ctx.rotate(totalRot+0.1+userRot);
    ctx.drawImage(wi,0,-wh*0.5,ww,wh);
    ctx.restore();
  }
}

var ANIMATIONS = {
  idle: { label:"Idle", desc:"Breathing & weight shift", generate: function(ctx,img,f,tot,sz,bd,wpn) {
    var t=(f/tot)*Math.PI*2;
    var breathe=Math.sin(t), shift=Math.sin(t*0.5);
    var pose = {
      head:{rot:shift*0.02, oy:breathe*-1.5},
      torso:{rot:shift*0.015, oy:breathe*-1},
      leftArm:{rot:0.05+breathe*0.04+shift*0.03},
      rightArm:{rot:-0.05-breathe*0.04-shift*0.03},
      leftLeg:{rot:shift*0.03},
      rightLeg:{rot:-shift*0.03},
      by:breathe*-1
    };
    if(bd) drawAnimChar(ctx,bd,sz,pose); else drawCharFallback(ctx,img,sz,pose);
    if(wpn&&wpn.showAll) drawWeapon(ctx,wpn,bd,sz,pose,"back");
  }},
  run: { label:"Run", desc:"Full sprint cycle", generate: function(ctx,img,f,tot,sz,bd,wpn) {
    var t=(f/tot)*Math.PI*2;
    var contactPhase=Math.cos(t*2);
    var bounce=(-Math.abs(Math.sin(t))*0.04+(contactPhase>0.5?-0.015:0))*sz;
    var lean=0.08;
    var lp=Math.sin(t);
    var lf=lp>0?Math.pow(lp,0.7):-Math.pow(-lp,0.7);
    var pose = {
      head:{rot:lean*0.3+Math.sin(t*2)*0.02, oy:bounce*0.4},
      torso:{rot:lean+Math.sin(t)*0.06, oy:bounce*0.3},
      leftArm:{rot:-lf*0.85+lean*0.5},
      rightArm:{rot:lf*0.85+lean*0.5},
      leftLeg:{rot:lf*0.8},
      rightLeg:{rot:-lf*0.8},
      by:bounce
    };
    if(bd) drawAnimChar(ctx,bd,sz,pose); else drawCharFallback(ctx,img,sz,pose);
    if(wpn&&wpn.showAll) drawWeapon(ctx,wpn,bd,sz,pose,"back");
    if(Math.abs(Math.sin(t))>0.92) drawDust(ctx,sz/2+Math.sin(t)*6,sz*0.88+bounce,5,sz*0.06,0.35,sz*0.01);
  }},
  walk: { label:"Walk", desc:"Natural walking gait", generate: function(ctx,img,f,tot,sz,bd,wpn) {
    var t=(f/tot)*Math.PI*2;
    var bounce=Math.sin(t*2+Math.PI/2)*sz*0.012;
    var hipSway=Math.sin(t)*sz*0.008;
    var ls=Math.sin(t), twist=Math.sin(t)*0.04;
    var pose = {
      head:{rot:-twist*0.3, ox:-hipSway*0.3},
      torso:{rot:twist, ox:hipSway},
      leftArm:{rot:-ls*0.35-0.05},
      rightArm:{rot:ls*0.35+0.05},
      leftLeg:{rot:ls*0.45},
      rightLeg:{rot:-ls*0.45},
      by:bounce
    };
    if(bd) drawAnimChar(ctx,bd,sz,pose); else drawCharFallback(ctx,img,sz,pose);
    if(wpn&&wpn.showAll) drawWeapon(ctx,wpn,bd,sz,pose,"back");
  }},
  jump: { label:"Jump", desc:"Squat, launch, peak, land", linear:true, generate: function(ctx,img,f,tot,sz,bd,wpn) {
    var t=f/Math.max(tot-1,1);
    var arc=-Math.sin(t*Math.PI)*sz*0.18;
    var p={head:{},torso:{},leftArm:{},rightArm:{},leftLeg:{},rightLeg:{},by:arc};
    if(t<0.15){var q=t/0.15,e=q*q; p.torso={rot:e*0.05,oy:e*sz*0.02}; p.leftLeg={rot:e*0.15}; p.rightLeg={rot:-e*0.15}; p.leftArm={rot:e*0.2}; p.rightArm={rot:-e*0.2}; p.head={rot:-e*0.03};}
    else if(t<0.35){var q=(t-0.15)/0.2,e=1-Math.pow(1-q,2); p.torso={rot:0.05*(1-e)-e*0.03,oy:0.02*sz*(1-e)}; p.leftLeg={rot:0.15*(1-e)-e*0.1}; p.rightLeg={rot:-0.15*(1-e)+e*0.1}; p.leftArm={rot:0.2-e*0.6}; p.rightArm={rot:-0.2+e*0.6}; p.head={rot:-0.03+e*0.04};}
    else if(t<0.65){var q=(t-0.35)/0.3,tk=Math.sin(q*Math.PI); p.leftArm={rot:-0.4-tk*0.1}; p.rightArm={rot:0.4+tk*0.1}; p.leftLeg={rot:tk*0.12}; p.rightLeg={rot:tk*0.12}; p.torso={rot:-0.03}; p.head={rot:0.01};}

function removeBackground(img, tolerance) {
  var c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  var ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  var id = ctx.getImageData(0, 0, c.width, c.height);
  var d = id.data;
  var w = c.width, h = c.height;
  var tol = tolerance || 30;
  var visited = new Uint8Array(w * h);

  // Get background color samples from corners
  function getPixel(x, y) { var i = (y * w + x) * 4; return [d[i], d[i+1], d[i+2], d[i+3]]; }
  function colorDist(a, b) { return Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) + Math.abs(a[2]-b[2]); }

  // Sample multiple corner pixels to get reliable bg color
  var samples = [];
  var margin = Math.max(1, Math.floor(Math.min(w, h) * 0.02));
  for (var sy = 0; sy < margin; sy++) {
    for (var sx = 0; sx < margin; sx++) {
      samples.push(getPixel(sx, sy));
      samples.push(getPixel(w - 1 - sx, sy));
      samples.push(getPixel(sx, h - 1 - sy));
      samples.push(getPixel(w - 1 - sx, h - 1 - sy));
    }
  }
  // Average bg color
  var bg = [0,0,0];
  samples.forEach(function(s) { bg[0] += s[0]; bg[1] += s[1]; bg[2] += s[2]; });
  bg[0] = Math.round(bg[0] / samples.length);
  bg[1] = Math.round(bg[1] / samples.length);
  bg[2] = Math.round(bg[2] / samples.length);

  // Flood fill from edges
  var queue = [];
  for (var x = 0; x < w; x++) { queue.push(x); queue.push(0); queue.push(x); queue.push(h-1); }
  for (var y = 1; y < h-1; y++) { queue.push(0); queue.push(y); queue.push(w-1); queue.push(y); }

  while (queue.length > 0) {
    var qy = queue.pop(), qx = queue.pop();
    if (qx < 0 || qx >= w || qy < 0 || qy >= h) continue;
    var qi = qy * w + qx;
    if (visited[qi]) continue;
    var px = getPixel(qx, qy);
    if (colorDist(px, bg) > tol) continue;
    visited[qi] = 1;
    d[qi * 4 + 3] = 0;
    queue.push(qx-1); queue.push(qy);
    queue.push(qx+1); queue.push(qy);
    queue.push(qx); queue.push(qy-1);
    queue.push(qx); queue.push(qy+1);
  }

  ctx.putImageData(id, 0, 0);
  var result = new Image();
  result.src = c.toDataURL();
  result.width = w; result.height = h;
  return result;
}
